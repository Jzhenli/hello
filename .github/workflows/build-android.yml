name: Build Android APK

on:
  push:
    tags:
      - 'android-*/v*'
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App to build'
        required: true
        type: choice
        options: [hello, weather, xagent]
        default: 'xagent'
      python_version:
        description: 'Python version'
        required: false
        type: choice
        options: ['3.10', '3.11', '3.12']
        default: '3.10'
      architectures:
        description: 'Target architectures'
        required: false
        type: choice
        options: [arm64, arm32, 'arm64,arm32']
        default: 'arm64'
      enable_nuitka:
        description: 'Enable Nuitka compilation'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      app_name: ${{ steps.vars.outputs.app_name }}
      enable_nuitka: ${{ steps.vars.outputs.enable_nuitka }}
      app_version: ${{ steps.vars.outputs.app_version }}
      briefcase_version: ${{ steps.versions.outputs.briefcase }}
      nuitka_version: ${{ steps.versions.outputs.nuitka }}
      compile_matrix: ${{ steps.matrix.outputs.compile_matrix }}
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Read versions from config
        id: versions
        run: |
          BV=$(python3 -c "import sys; sys.path.insert(0,'scripts'); from config import BRIEFCASE_VERSION; print(BRIEFCASE_VERSION)")
          NV=$(python3 -c "import sys; sys.path.insert(0,'scripts'); from config import NUITKA_VERSION; print(NUITKA_VERSION)")
          echo "briefcase=$BV" >> $GITHUB_OUTPUT
          echo "nuitka=$NV" >> $GITHUB_OUTPUT

      - name: Resolve variables
        id: vars
        run: |
          if [[ "$GITHUB_REF" == refs/tags/android-*/v* ]]; then
            TAG=${GITHUB_REF#refs/tags/android-}
            APP_NAME=${TAG%/v*}
            APP_VERSION=${TAG#*/v}
          else
            APP_NAME="${{ inputs.app_name || 'xagent' }}"
            APP_VERSION=""
          fi

          [ ! -d "apps/$APP_NAME" ] && { echo "::error::App '$APP_NAME' not found"; exit 1; }
          [ -z "$APP_VERSION" ] && APP_VERSION=$(python3 -c "
          import sys; sys.path.insert(0,'scripts')
          from utils import extract_version_from_pyproject
          print(extract_version_from_pyproject('apps/$APP_NAME/pyproject.toml'))
          ")

          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "enable_nuitka=${{ inputs.enable_nuitka || 'true' }}" >> $GITHUB_OUTPUT
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT

      - name: Generate matrix
        id: matrix
        run: |
          ARCHS="${{ inputs.architectures || 'arm64' }}"
          ARCHS=$(echo "$ARCHS" | tr -d ' ')
          COMPILE=""
          BUILD=""

          [[ "$ARCHS" == *"arm64"* ]] && COMPILE+='{"arch":"arm64","runs_on":"ubuntu-24.04-arm","termux_arch":"aarch64","android_abi":"arm64-v8a"},' && BUILD+='{"arch":"arm64","android_abi":"arm64-v8a","apk_arch":"arm64"},'
          [[ "$ARCHS" == *"arm32"* ]] && COMPILE+='{"arch":"arm32","runs_on":"ubuntu-24.04-arm","termux_arch":"arm","android_abi":"armeabi-v7a"},' && BUILD+='{"arch":"arm32","android_abi":"armeabi-v7a","apk_arch":"arm32"},'

          echo "compile_matrix=[${COMPILE%,}]" >> $GITHUB_OUTPUT
          echo "build_matrix=[${BUILD%,}]" >> $GITHUB_OUTPUT

  compile:
    needs: config
    if: needs.config.outputs.enable_nuitka == 'true'
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.config.outputs.compile_matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Compile in Termux Docker
        run: |
          APP_NAME="${{ needs.config.outputs.app_name }}"
          PY_VER="${{ inputs.python_version || '3.10' }}"
          NUITKA_VER="${{ needs.config.outputs.nuitka_version }}"
          IMAGE="termux/termux-docker:${{ matrix.termux_arch }}"

          mkdir -p dist && chmod -R 777 dist apps/

          sed -e "s/APP_NAME/$APP_NAME/g" \
              -e "s/APP_PY_VER/$PY_VER/g" \
              -e "s/NUITKA_VER/$NUITKA_VER/g" \
              scripts/termux_compile.sh > build_termux.sh

          docker run --rm -v $PWD:/src "$IMAGE" bash /src/build_termux.sh

      - uses: actions/upload-artifact@v4
        with:
          name: compiled-${{ matrix.android_abi }}
          path: dist/*.so
          retention-days: 1

  build:
    needs: [config, compile]
    if: >-
      always() &&
      needs.config.result == 'success' &&
      (needs.config.outputs.enable_nuitka != 'true' || needs.compile.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.config.outputs.build_matrix) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        if: needs.config.outputs.enable_nuitka == 'true'
        with:
          name: compiled-${{ matrix.android_abi }}
          path: dist/${{ matrix.android_abi }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version || '3.10' }}

      - name: Install Briefcase
        run: |
          pip install -U setuptools wheel
          pip install briefcase==${{ needs.config.outputs.briefcase_version }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm

      - name: Create Android project
        run: |
          cd "apps/${{ needs.config.outputs.app_name }}"
          briefcase create android -C "build_gradle_extra_content = \"android.defaultConfig.ndk.abiFilters = ['${{ matrix.android_abi }}']\""

      - name: Process compiled module
        if: needs.config.outputs.enable_nuitka == 'true'
        run: |
          APP_NAME="${{ needs.config.outputs.app_name }}"
          PYTHON_DIR="apps/${APP_NAME}/build/${APP_NAME}/android/gradle/app/src/main/python"
          SO_FILE="dist/${{ matrix.android_abi }}/${APP_NAME}.so"

          [ ! -d "$PYTHON_DIR" ] && { echo "::error::Python dir not found: $PYTHON_DIR"; exit 1; }
          [ ! -f "$SO_FILE" ] && { echo "::error::.so not found: $SO_FILE"; exit 1; }

          cp "$SO_FILE" "$PYTHON_DIR/${APP_NAME}.so"
          python scripts/nuitka_compile.py "$PYTHON_DIR" --stub-only --module "$APP_NAME"

      - name: Build & Package APK
        run: |
          cd "apps/${{ needs.config.outputs.app_name }}"
          briefcase build android
          briefcase package android --adhoc-sign -p debug-apk

      - name: Collect APK
        run: |
          APP_NAME="${{ needs.config.outputs.app_name }}"
          cd "apps/${APP_NAME}"
          mkdir -p ../../final_dist
          APK=$(ls dist/*.apk 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            BASE=$(basename "$APK" .apk)
            NEW=$(echo "$BASE" | sed -E "s/^([^-]+)-(.+)$/\1-${{ matrix.apk_arch }}-\2/")
            [ "$NEW" = "$BASE" ] && NEW="${BASE}-${{ matrix.apk_arch }}"
            mv "$APK" "../../final_dist/${NEW}.apk"
          else
            find . -name "*.apk" -exec cp {} ../../final_dist/ \;
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.android_abi }}
          path: final_dist/

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: log-failure-${{ matrix.android_abi }}
          path: apps/${{ needs.config.outputs.app_name }}/logs/*

      - name: Summary
        run: |
          echo "### Android Build (${{ matrix.android_abi }})" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: ${{ needs.config.outputs.app_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ needs.config.outputs.app_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Nuitka**: ${{ needs.config.outputs.enable_nuitka }}" >> $GITHUB_STEP_SUMMARY
