name: Build Android APK

on:
  push:
    tags:
      - 'android-*/v*'
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App to build (hello / weather / xagent)'
        required: true
        type: choice
        options:
          - hello
          - weather
          - xagent
        default: 'xagent'
      python_version:
        description: 'Python version (3.10 / 3.11 / 3.12)'
        required: false
        type: choice
        options:
          - '3.10'
          - '3.11'
          - '3.12'
        default: '3.10'
      architectures:
        description: 'Target architectures (arm64 / arm32 / arm64,arm32)'
        required: false
        type: choice
        options:
          - 'arm64'
          - 'arm32'
          - 'arm64,arm32'
        default: 'arm64'
      enable_nuitka:
        description: 'Enable Nuitka compilation for source protection'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: ${{ inputs.python_version || '3.10' }}
  NUITKA_VERSION: '2.7.12'
  BRIEFCASE_VERSION: '0.4.2'

jobs:
  # ============================================================
  # 1. 准备配置 + 动态矩阵生成
  # ============================================================
  prepare:
    runs-on: ubuntu-latest
    outputs:
      app_name: ${{ steps.config.outputs.app_name }}
      architectures: ${{ steps.config.outputs.architectures }}
      enable_nuitka: ${{ steps.config.outputs.enable_nuitka }}
      app_version: ${{ steps.config.outputs.app_version }}
      compile_matrix: ${{ steps.matrix.outputs.compile_matrix }}
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract configuration
        id: config
        run: |
          if [[ "$GITHUB_REF" == refs/tags/android-*/v* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            APP_NAME=${TAG_NAME#android-}
            APP_NAME=${APP_NAME%/v*}
            APP_VERSION=${TAG_NAME#*/v}
            echo "📋 Tag解析: APP_NAME=$APP_NAME, APP_VERSION=$APP_VERSION"
          else
            APP_NAME="${{ inputs.app_name || 'xagent' }}"
            APP_VERSION=""
          fi

          if [ ! -d "apps/$APP_NAME" ]; then
            echo "::error::App '$APP_NAME' not found in apps/ directory"
            exit 1
          fi

          if [ -f "apps/$APP_NAME/pyproject.toml" ]; then
            if [ -z "$APP_VERSION" ]; then
              APP_VERSION=$(grep -Po 'version\s*=\s*"\K[^"]+' "apps/$APP_NAME/pyproject.toml" | head -1)
            fi
            if ! grep -q "\[tool.briefcase.app.${APP_NAME}.android\]" "apps/$APP_NAME/pyproject.toml" && \
               ! grep -q "\[tool.briefcase.app.${APP_NAME}\]" "apps/$APP_NAME/pyproject.toml"; then
              echo "::error::App '$APP_NAME' does not have Briefcase Android configuration in pyproject.toml"
              exit 1
            fi
          else
            echo "::error::pyproject.toml not found for app '$APP_NAME'"
            exit 1
          fi

          ARCHITECTURES="${{ inputs.architectures || 'arm64' }}"
          ARCHITECTURES=$(echo "$ARCHITECTURES" | tr -d ' ')
          ENABLE_NUITKA="${{ inputs.enable_nuitka || 'true' }}"

          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "architectures=$ARCHITECTURES" >> $GITHUB_OUTPUT
          echo "enable_nuitka=$ENABLE_NUITKA" >> $GITHUB_OUTPUT
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT

          echo "### Configuration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: $APP_NAME" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: $APP_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Python**: ${{ env.PYTHON_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Architectures**: $ARCHITECTURES" >> $GITHUB_STEP_SUMMARY
          echo "- **Nuitka**: $ENABLE_NUITKA" >> $GITHUB_STEP_SUMMARY

      - name: Generate matrix
        id: matrix
        run: |
          ARCHS="${{ steps.config.outputs.architectures }}"
          COMPILE_ENTRIES=""
          BUILD_ENTRIES=""

          if [[ "$ARCHS" == *"arm64"* ]]; then
            COMPILE_ENTRIES+='{"arch":"arm64","runs_on":"ubuntu-24.04-arm","termux_arch":"aarch64","android_abi":"arm64-v8a"},'
            BUILD_ENTRIES+='{"arch":"arm64","android_abi":"arm64-v8a","apk_arch":"arm64"},'
          fi

          if [[ "$ARCHS" == *"arm32"* ]]; then
            COMPILE_ENTRIES+='{"arch":"arm32","runs_on":"ubuntu-24.04-arm","termux_arch":"arm","android_abi":"armeabi-v7a"},'
            BUILD_ENTRIES+='{"arch":"arm32","android_abi":"armeabi-v7a","apk_arch":"arm32"},'
          fi

          COMPILE_MATRIX="[$(echo "$COMPILE_ENTRIES" | sed 's/,$//')]"
          BUILD_MATRIX="[$(echo "$BUILD_ENTRIES" | sed 's/,$//')]"

          echo "$COMPILE_MATRIX" | python3 -m json.tool > /dev/null || { echo "::error::Invalid compile matrix JSON"; exit 1; }
          echo "$BUILD_MATRIX" | python3 -m json.tool > /dev/null || { echo "::error::Invalid build matrix JSON"; exit 1; }

          echo "compile_matrix=$COMPILE_MATRIX" >> $GITHUB_OUTPUT
          echo "build_matrix=$BUILD_MATRIX" >> $GITHUB_OUTPUT

  # ============================================================
  # 2. 阶段 1：Termux 容器原生编译 .so
  # ============================================================
  compile:
    needs: prepare
    if: needs.prepare.outputs.enable_nuitka == 'true'
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.compile_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile in Termux Docker
        run: |
          APP_NAME="${{ needs.prepare.outputs.app_name }}"
          PY_VER="${{ env.PYTHON_VERSION }}"
          TERMUX_ARCH="${{ matrix.termux_arch }}"
          IMAGE="termux/termux-docker:${TERMUX_ARCH}"
          
          mkdir -p dist
          chmod -R 777 dist
          chmod -R 777 apps/
          
          cat > build_termux.sh << SCRIPT
          #!/data/data/com.termux/files/usr/bin/bash
          set -e
          
          export PREFIX=/data/data/com.termux/files/usr
          export PATH=\$PREFIX/bin:\$PATH
          export HOME=/data/data/com.termux/files/home
          export TMPDIR=\$PREFIX/tmp
          export LANG=en_US.UTF-8
          
          # 1. 修复 DNS
          echo "nameserver 8.8.8.8" > \$PREFIX/etc/resolv.conf
          echo "nameserver 8.8.4.4" >> \$PREFIX/etc/resolv.conf
          
          # 2. 换用 USTC 镜像源
          if [ -f "\$PREFIX/etc/apt/sources.list" ]; then
            sed -i 's|https://packages-cf.termux.dev/apt/termux-main|https://mirrors.ustc.edu.cn/termux/apt/termux-main|g' "\$PREFIX/etc/apt/sources.list"
            sed -i 's|https://packages.termux.dev/apt/termux-main|https://mirrors.ustc.edu.cn/termux/apt/termux-main|g' "\$PREFIX/etc/apt/sources.list"
            echo "✅ APT sources switched to USTC mirror"
          fi
          
          # 3. 更新包索引
          apt update -yq
          apt upgrade -yq
          
          # 4. 【关键顺序】先安装 tur-repo，再刷新索引，然后才能安装指定版本 Python
          apt install -yq tur-repo
          apt update -yq
          
          # 5. 安装指定版本 Python（来自 tur-repo）
          apt install -yq python${PY_VER}
          
          # 6. 动态检测实际安装的 Python 版本，创建符号链接
          PY_BIN=\$(ls \$PREFIX/bin/python3.* 2>/dev/null | grep -v config | head -1)
          if [ -z "\$PY_BIN" ]; then
            echo "::error::未找到 python3 二进制文件"
            exit 1
          fi
          PY_SFX=\$(basename "\$PY_BIN" | sed 's/python//')  # 例如 3.11
          echo "📋 Python: \$PY_BIN (后缀: \$PY_SFX)"
          
          rm -f \$PREFIX/bin/python \$PREFIX/bin/pip
          ln -sf "\$PY_BIN" \$PREFIX/bin/python
          if [ -f "\$PREFIX/bin/pip\${PY_SFX}" ]; then
            ln -sf "\$PREFIX/bin/pip\${PY_SFX}" \$PREFIX/bin/pip
          fi
          python --version
          
          # 7. 安装编译工具链
          apt install -yq ninja clang git patchelf ccache termux-elf-cleaner findutils
          
          # 8. 安装 Nuitka
          pip install --upgrade pip
          pip install MarkupSafe==2.1.3 ordered-set==4.1.0 zstandard==0.23.0 nuitka==${{ env.NUITKA_VERSION }}
          
          # 9. 执行 Nuitka 编译
          cd /src/apps/${APP_NAME}/src
          python -m nuitka \
            --module ${APP_NAME} \
            --include-package=${APP_NAME} \
            --nofollow-imports \
            --output-dir=dist \
            --remove-output \
            --assume-yes-for-downloads \
            --no-progressbar
          
          echo "📦 Nuitka output files:"
          ls -la ./dist/ || true
          find ./dist/ -name "*.so" -o -name "*.pyd" || true
          
          cp ./dist/*.so /src/dist/ 2>/dev/null || true
          cd /src/dist/
          
          SO_FILE=\$(ls ${APP_NAME}.*.so 2>/dev/null | head -1)
          if [ -z "\$SO_FILE" ]; then
            echo "::error::No .so file produced by Nuitka"
            exit 1
          fi
          
          mv "\$SO_FILE" ${APP_NAME}.so
          termux-elf-cleaner ${APP_NAME}.so || true
          patchelf --set-rpath '' ${APP_NAME}.so || true
          patchelf --replace-needed libpython\${PY_SFX}.so.1.0 libpython\${PY_SFX}.so ${APP_NAME}.so || true
          
          echo "✅ Compiled: ${APP_NAME}.so"
          SCRIPT
          
          docker run --rm \
            -v $PWD:/src \
            -e APP_NAME="${APP_NAME}" \
            -e PY_VER="${PY_VER}" \
            -e NUITKA_VERSION="${{ env.NUITKA_VERSION }}" \
            ${IMAGE} \
            bash /src/build_termux.sh

      - name: Upload compiled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-${{ matrix.android_abi }}
          path: dist/*.so
          retention-days: 1


  # ============================================================
  # 3. 阶段 2：Briefcase 打包 APK
  # ============================================================
  build:
    needs: [prepare, compile]
    if: >-
      always() && 
      needs.prepare.result == 'success' && 
      (needs.prepare.outputs.enable_nuitka != 'true' || needs.compile.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.build_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download compiled artifacts
        if: needs.prepare.outputs.enable_nuitka == 'true'
        uses: actions/download-artifact@v4
        with:
          name: compiled-${{ matrix.android_abi }}
          path: dist/${{ matrix.android_abi }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Briefcase
        run: |
          pip install -U setuptools wheel
          pip install briefcase==${{ env.BRIEFCASE_VERSION }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Environment
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
          | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Create Android project
        run: |
          APP_NAME="${{ needs.prepare.outputs.app_name }}"
          cd "apps/${APP_NAME}"
          briefcase create android -C "build_gradle_extra_content = \"android.defaultConfig.ndk.abiFilters = ['${{ matrix.android_abi }}']\""

      - name: Process compiled module
        if: needs.prepare.outputs.enable_nuitka == 'true'
        run: |
          APP_NAME="${{ needs.prepare.outputs.app_name }}"
          PYTHON_DIR="apps/${APP_NAME}/build/${APP_NAME}/android/gradle/app/src/main/python"
          
          if [ ! -d "$PYTHON_DIR" ]; then
            echo "::error::Python 目录未找到: $PYTHON_DIR"
            find "apps/${APP_NAME}/build" -type d 2>/dev/null | head -20
            exit 1
          fi
          
          echo "✅ Python 目录: $PYTHON_DIR"
          
          if [ -f "dist/${{ matrix.android_abi }}/${APP_NAME}.so" ]; then
            echo "📦 处理编译模块: ${APP_NAME}.so"
            cd "$PYTHON_DIR"
            
            saved_resources=()
            if [ -d "${APP_NAME}" ]; then
              while IFS= read -r -d '' f; do
                if [ -f "$f" ]; then
                  saved_resources+=("$f")
                fi
              done < <(find "${APP_NAME}" -type f ! -name '*.py' -print0 2>/dev/null)
            fi
            
            if [ ${#saved_resources[@]} -gt 0 ]; then
              echo "  保留 ${#saved_resources[@]} 个非 .py 资源文件"
            fi
            
            rm -rf "${APP_NAME}"
            mkdir -p "${APP_NAME}"
            
            for res in "${saved_resources[@]}"; do
              rel_path=${res#${APP_NAME}/}
              dest_dir="$(dirname "${APP_NAME}/$rel_path")"
              mkdir -p "$dest_dir"
              cp "$res" "${APP_NAME}/$rel_path" 2>/dev/null || true
            done
            
            cp "${GITHUB_WORKSPACE}/dist/${{ matrix.android_abi }}/${APP_NAME}.so" .
            
            cat > "${APP_NAME}/__init__.py" << 'EOF'
          import sys
          _n = __name__
          print(f"[STUB] {_n}.__init__ starting")
          
          if _n in sys.modules and hasattr(sys.modules[_n], '_nuitka_loaded'):
              print(f"[STUB] {_n} already loaded")
              _existing = sys.modules[_n]
              globals().update({k: v for k, v in vars(_existing).items() if not k.startswith('_')})
          else:
              print(f"[STUB] {_n} first time load")
              import os
              _d = os.path.dirname(os.path.abspath(__file__))
              _p = os.path.dirname(_d)
              _f = next((f for f in os.listdir(_p) if f.startswith(_n) and f.endswith(('.pyd', '.so'))), None)
              print(f"[STUB] .so file: {_f}")
              
              if _f:
                  if hasattr(os, 'add_dll_directory'): 
                      os.add_dll_directory(_p)
                  
                  _so_path = os.path.join(_p, _f)
                  print(f"[STUB] .so path: {_so_path}")
                  
                  # 使用 ctypes 直接加载 .so
                  import ctypes
                  print(f"[STUB] Loading .so with ctypes...")
                  _lib = ctypes.CDLL(_so_path)
                  print(f"[STUB] .so loaded: {_lib}")
                  
                  # 查找 PyInit 函数
                  _init_func_name = f'PyInit_{_n}'
                  print(f"[STUB] Looking for {_init_func_name}...")
                  try:
                      _init_func = getattr(_lib, _init_func_name)
                      print(f"[STUB] Found {_init_func_name}: {_init_func}")
                  except AttributeError:
                      print(f"[STUB] {_init_func_name} not found, listing symbols...")
                      # 尝试列出 .so 中的符号
                      try:
                          import ctypes.util
                          _syms = []
                          # 常见的 PyInit 函数名
                          for _sym in ['PyInit_' + _n, 'init' + _n, 'PyInit_module']:
                              try:
                                  _func = getattr(_lib, _sym)
                                  print(f"[STUB] Found symbol: {_sym}")
                                  _syms.append((_sym, _func))
                              except AttributeError:
                                  pass
                          if _syms:
                              _init_func = _syms[0][1]
                          else:
                              raise ImportError(f"No init function found in {_so_path}")
                      except Exception as e:
                          print(f"[STUB] Error finding symbols: {e}")
                          raise
                  
                  # 设置函数签名
                  _init_func.restype = ctypes.py_object
                  _init_func.argtypes = []
                  
                  print(f"[STUB] Calling {_init_func_name}...")
                  try:
                      _result = _init_func()
                      print(f"[STUB] Init function returned: {_result}, type: {type(_result)}")
                  except Exception as e:
                      print(f"[STUB] Init function failed: {type(e).__name__}: {e}")
                      import traceback
                      traceback.print_exc()
                      raise
                  
                  # 检查返回的模块对象
                  if _result is not None:
                      print(f"[STUB] Module from init: {dir(_result)}")
                      print(f"[STUB] Module attributes: {[k for k in dir(_result) if not k.startswith('_')]}")
                      
                      # 更新 sys.modules 和 globals
                      sys.modules[_n] = _result
                      globals().update({k: v for k, v in vars(_result).items() if not k.startswith('_')})
                      globals()['_nuitka_loaded'] = True
                      print(f"[STUB] Loaded to globals: {[k for k in globals() if not k.startswith('_')]}")
                  else:
                      print(f"[STUB] Init function returned None")
                      raise ImportError(f"Init function returned None")
              else:
                  raise ImportError(f"No .so file for {_n}")
          EOF

            cat > "${APP_NAME}/__main__.py" << 'EOF'
          import importlib, sys
          _m = importlib.import_module(__package__)
          _m.main() if hasattr(_m, 'main') else sys.exit(f'No main() in {__package__}')
          EOF
            
            echo "✅ 入口桩文件: ${APP_NAME}/__init__.py, __main__.py"
            echo "✅ 编译模块: ${APP_NAME}.so"
          else
            echo "::error::Compiled .so not found at dist/${{ matrix.android_abi }}/${APP_NAME}.so"
            exit 1
          fi

      - name: Build Android APK
        run: |
          APP_NAME="${{ needs.prepare.outputs.app_name }}"
          cd "apps/${APP_NAME}"
          briefcase build android

      - name: Package Android APK
        run: |
          APP_NAME="${{ needs.prepare.outputs.app_name }}"
          cd "apps/${APP_NAME}"
          briefcase package android --adhoc-sign -p debug-apk

      - name: Rename and collect APK
        run: |
          APP_NAME="${{ needs.prepare.outputs.app_name }}"
          cd "apps/${APP_NAME}"
          mkdir -p ../../final_dist

          APK=$(ls dist/*.apk 2>/dev/null | head -n 1)
          if [ -n "$APK" ]; then
            BASENAME=$(basename "$APK" .apk)
            NEWNAME=$(echo "$BASENAME" | sed -E 's/^([^-]+)-(.+)$/\1-${{ matrix.apk_arch }}-\2/')
            if [ "$NEWNAME" = "$BASENAME" ]; then
              NEWNAME="${BASENAME}-${{ matrix.apk_arch }}"
            fi
            mv "$APK" "../../final_dist/${NEWNAME}.apk"
            echo "✅ APK: ${NEWNAME}.apk"
          else
            echo "::warning::APK not found in dist/*.apk, attempting deep search..."
            find . -name "*.apk" -exec cp {} ../../final_dist/ \;
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.android_abi }}
          path: final_dist/

      - name: Upload Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: log-failure-${{ matrix.android_abi }}
          path: apps/${{ needs.prepare.outputs.app_name }}/logs/*

      - name: Build summary
        run: |
          APP_NAME="${{ needs.prepare.outputs.app_name }}"
          APP_VERSION="${{ needs.prepare.outputs.app_version }}"
          echo "### Build Summary (${{ matrix.android_abi }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: ${APP_NAME}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${APP_VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- **Architecture**: ${{ matrix.android_abi }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Nuitka**: ${{ needs.prepare.outputs.enable_nuitka }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Artifacts" >> $GITHUB_STEP_SUMMARY
          if [ -d "final_dist" ] && [ "$(ls -A final_dist 2>/dev/null)" ]; then
            for f in final_dist/*; do
              [ -f "$f" ] && echo "- \`${f#final_dist/}\`: $(du -sh "$f" | cut -f1)" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "- No artifacts generated" >> $GITHUB_STEP_SUMMARY
          fi
