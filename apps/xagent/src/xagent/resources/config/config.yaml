# XAgent Gateway Configuration

server:
  host: "0.0.0.0"
  port: 8080
  debug: false

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "${log_dir}/xagent.log"
  max_bytes: 10485760
  backup_count: 5
  console: true
  date_format: "%Y-%m-%d %H:%M:%S"
  color: true

storage:
  type: "sqlite"
  database: "${data_dir}/xagent.db"
  wal_mode: true
  batch_size: 100
  flush_interval: 5
  retention_days: 1
  cleanup_interval: 300
  cleanup_batch_size: 10000

plugins:
  failure_strategy: continue
  allow_partial_startup: true
  
  south: []
  north: []
  filter: []

scheduler:
  max_workers: 10
  task_timeout: 30

metrics:
  enabled: true
  port: 9090
