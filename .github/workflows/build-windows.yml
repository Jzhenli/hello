name: Build Windows App (Briefcase)

on:
  push:
    tags:
      - 'weather-windows/v*'
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Application to build'
        required: true
        default: 'weather'
        type: choice
        options:
          - weather
      version:
        description: 'Version (e.g., 1.0.0)'
        required: false
        default: ''
      enable_nuitka:
        description: 'Enable Nuitka compilation'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      - name: Install Nuitka and dependencies
        if: inputs.enable_nuitka != false
        run: |
          pip install nuitka ordered-set zstandard
          pip install imageio

      - name: Setup MSVC for Nuitka
        if: inputs.enable_nuitka != false
        uses: ilammy/msvc-dev-cmd@v1

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: tag_info
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          APP_NAME="${TAG_NAME%-windows/*}"
          VERSION="${TAG_NAME#*/v}"
          echo "APP_NAME=$APP_NAME" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Set build variables
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "APP_NAME=${{ inputs.app_name }}" >> $GITHUB_OUTPUT
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "ENABLE_NUITKA=${{ inputs.enable_nuitka }}" >> $GITHUB_OUTPUT
          else
            echo "APP_NAME=${{ steps.tag_info.outputs.APP_NAME }}" >> $GITHUB_OUTPUT
            echo "VERSION=${{ steps.tag_info.outputs.VERSION }}" >> $GITHUB_OUTPUT
            echo "ENABLE_NUITKA=true" >> $GITHUB_OUTPUT
          fi

      - name: Update version in pyproject.toml
        if: steps.vars.outputs.VERSION != ''
        shell: bash
        working-directory: apps/${{ steps.vars.outputs.APP_NAME }}
        run: |
          VERSION="${{ steps.vars.outputs.VERSION }}"
          if [ -f pyproject.toml ]; then
            sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
            echo "Updated version to $VERSION"
          fi

      - name: Create Briefcase project
        working-directory: apps/${{ steps.vars.outputs.APP_NAME }}
        run: |
          briefcase create windows

      - name: Compile Python modules with Nuitka
        if: steps.vars.outputs.ENABLE_NUITKA == 'true'
        shell: bash
        working-directory: apps/${{ steps.vars.outputs.APP_NAME }}
        run: |
          APP_NAME="${{ steps.vars.outputs.APP_NAME }}"
          
          PROJECT_NAME=$(echo "${APP_NAME^}" | sed 's/^./\u&/')
          [ -z "$PROJECT_NAME" ] && PROJECT_NAME="${APP_NAME^}"
          
          for dir in build/${APP_NAME}/windows/app/*/; do
            if [ -d "$dir/app" ]; then
              APP_DIR="$dir"
              break
            fi
          done
          
          if [ -z "$APP_DIR" ]; then
            POSSIBLE_PATHS=(
              "build/${APP_NAME}/windows/app/${PROJECT_NAME}/app"
              "build/${APP_NAME}/windows/app/Weather/app"
            )
            for p in "${POSSIBLE_PATHS[@]}"; do
              if [ -d "$p" ]; then
                APP_DIR=$(dirname "$p")
                break
              fi
            done
          fi
          
          if [ -z "$APP_DIR" ]; then
            echo "错误: 找不到 Briefcase 应用目录"
            echo "当前目录结构:"
            find build -type d -name "app" 2>/dev/null | head -20
            exit 1
          fi
          
          SRC_DIR="${APP_DIR}/app"
          
          echo "=== Nuitka 编译开始 ==="
          echo "应用目录: $APP_DIR"
          echo "源码目录: $SRC_DIR"
          echo "目录内容:"
          ls -la "$SRC_DIR/"
          
          cd "$SRC_DIR"
          
          for module_dir in */ ; do
            module_name="${module_dir%/}"
            
            if [ "$module_name" = "__pycache__" ] || [ ! -f "$module_name/__init__.py" ]; then
              continue
            fi
            
            if [ -f "$module_name/__main__.py" ]; then
              MAIN_FUNC=$(grep -E "^def main\s*\(" "$module_name/__main__.py" 2>/dev/null | head -1)
              if [ -n "$MAIN_FUNC" ]; then
                HAS_MAIN_FUNC=true
              else
                HAS_MAIN_FUNC=false
              fi
              echo "模块 $module_name 有 __main__.py, main函数: $HAS_MAIN_FUNC"
            fi
            
            echo "--- 编译模块: $module_name ---"
            
            python -m nuitka \
              --module "$module_name" \
              --output-dir=./compiled \
              --remove-output \
              --assume-yes-for-downloads \
              --nofollow-imports \
              --follow-import-to="$module_name" \
              --no-progressbar 2>&1
          done
          
          echo "--- 移动编译产物 ---"
          if [ -d "./compiled" ]; then
            for pyd_file in ./compiled/*.pyd; do
              if [ -f "$pyd_file" ]; then
                cp "$pyd_file" ./
                echo "已复制: $(basename $pyd_file)"
              fi
            done
          fi
          
          echo "--- 创建入口文件并清理源码 ---"
          for module_dir in */ ; do
            module_name="${module_dir%/}"
            if [ "$module_name" = "__pycache__" ] || [ "$module_name" = "compiled" ]; then
              continue
            fi
            
            pyd_file="${module_name}.cp311-win_amd64.pyd"
            
            if [ -f "$pyd_file" ]; then
              echo "处理模块: $module_name"
              
              mv "$pyd_file" "${module_name}_compiled.pyd"
              echo "重命名: $pyd_file -> ${module_name}_compiled.pyd"
              
              if [ -f "$module_name/__main__.py" ]; then
                echo "创建入口文件: ${module_name}/__init__.py"
                
                echo 'import sys' > "$module_name/__init__.py"
                echo 'import os' >> "$module_name/__init__.py"
                echo '' >> "$module_name/__init__.py"
                echo "_pyd_name = \"${module_name}_compiled\"" >> "$module_name/__init__.py"
                echo 'try:' >> "$module_name/__init__.py"
                echo '    import importlib.util' >> "$module_name/__init__.py"
                echo '    spec = importlib.util.find_spec(_pyd_name)' >> "$module_name/__init__.py"
                echo '    if spec and spec.loader:' >> "$module_name/__init__.py"
                echo '        _module = importlib.util.module_from_spec(spec)' >> "$module_name/__init__.py"
                echo "        sys.modules[\"${module_name}\"] = _module" >> "$module_name/__init__.py"
                echo '        spec.loader.exec_module(_module)' >> "$module_name/__init__.py"
                echo 'except Exception as e:' >> "$module_name/__init__.py"
                echo '    print(f"Warning: Could not load compiled module: {e}")' >> "$module_name/__init__.py"
                echo '' >> "$module_name/__init__.py"
                echo "from ${module_name}_compiled import *" >> "$module_name/__init__.py"
                
                echo 'import sys' > "$module_name/__main__.py"
                echo 'import os' >> "$module_name/__main__.py"
                echo '' >> "$module_name/__main__.py"
                echo 'sys.path.insert(0, os.path.dirname(os.path.abspath(__file__)))' >> "$module_name/__main__.py"
                echo '' >> "$module_name/__main__.py"
                echo 'try:' >> "$module_name/__main__.py"
                echo "    from ${module_name}_compiled import main" >> "$module_name/__main__.py"
                echo '    main()' >> "$module_name/__main__.py"
                echo 'except ImportError as e:' >> "$module_name/__main__.py"
                echo '    print(f"Error importing compiled module: {e}")' >> "$module_name/__main__.py"
                echo '    sys.exit(1)' >> "$module_name/__main__.py"
                echo 'except Exception as e:' >> "$module_name/__main__.py"
                echo '    print(f"Error starting application: {e}")' >> "$module_name/__main__.py"
                echo '    sys.exit(1)' >> "$module_name/__main__.py"
                
                echo "已创建入口文件"
              else
                echo "移除源码目录: $module_name"
                rm -rf "$module_name"
              fi
            fi
          done
          
          rm -rf ./compiled 2>/dev/null || true
          
          echo "=== Nuitka 编译完成 ==="
          echo "编译产物:"
          ls -la *.pyd 2>/dev/null || echo "未找到 .pyd 文件"
          
          echo ""
          echo "最终目录结构:"
          ls -la
          
          echo ""
          echo "入口模块内容:"
          for d in */ ; do
            if [ -f "$d/__main__.py" ]; then
              echo "--- $d ---"
              ls -la "$d"
            fi
          done

      - name: Build Windows app
        working-directory: apps/${{ steps.vars.outputs.APP_NAME }}
        run: |
          briefcase build windows

      - name: Package Windows app
        working-directory: apps/${{ steps.vars.outputs.APP_NAME }}
        run: |
          briefcase package windows --adhoc-sign -p zip

      - name: Prepare distribution
        shell: bash
        working-directory: apps/${{ steps.vars.outputs.APP_NAME }}
        run: |
          mkdir -p dist
          VERSION="${{ steps.vars.outputs.VERSION }}"
          [ -z "$VERSION" ] && VERSION="dev"
          
          if [ -d "build/weather/windows/app/Weather" ]; then
            cp -r "build/weather/windows/app/Weather" "dist/weather-$VERSION-windows"
          fi
          
          if [ -f "build/weather/windows/app/Weather.zip" ]; then
            cp "build/weather/windows/app/Weather.zip" "dist/weather-$VERSION-windows.zip"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ steps.vars.outputs.APP_NAME }}-${{ steps.vars.outputs.VERSION }}
          path: apps/${{ steps.vars.outputs.APP_NAME }}/dist/

      - name: Build summary
        shell: bash
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: ${{ steps.vars.outputs.APP_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.vars.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: Windows" >> $GITHUB_STEP_SUMMARY
          echo "- **Nuitka**: ${{ steps.vars.outputs.ENABLE_NUITKA }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Artifacts" >> $GITHUB_STEP_SUMMARY
          ls -la apps/${{ steps.vars.outputs.APP_NAME }}/dist/ 2>/dev/null || echo "No artifacts found"
