name: Build ARM32 Shared AppDir

on:
  push:
    tags:
      - 'shared-python/v*'
      - '*/v*'
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version (3.10 / 3.11 / 3.12)'
        required: false
        default: '3.11'
      distro:
        description: 'Debian distro (bullseye for older GLIBC 2.31, bookworm for GLIBC 2.36)'
        required: false
        type: choice
        options:
          - bullseye
          - bookworm
        default: 'bullseye'
      strip_stdlib:
        description: 'Strip unused stdlib modules (saves ~3 MB)'
        required: false
        type: boolean
        default: true
      enable_nuitka:
        description: 'Enable Nuitka compilation'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

env:
  PYTHON_VERSION: ${{ inputs.python_version || '3.11' }}
  PBS_RELEASE: '20260508'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract tag info
        id: tag_info
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            COMPONENT_NAME=${TAG_NAME%/*}
            COMPONENT_VERSION=${TAG_NAME#*/v}
            COMPONENT_VERSION=${COMPONENT_VERSION#v}
            if [ "$COMPONENT_NAME" = "shared-python" ]; then
              BUILD_TYPE="python-only"
            elif [ -d "apps/$COMPONENT_NAME" ]; then
              BUILD_TYPE="app-only"
            else
              echo "⚠️ 标签 $TAG_NAME 对应的组件 apps/$COMPONENT_NAME 不存在，跳过构建"
              BUILD_TYPE="skip"
            fi
            echo "COMPONENT_NAME=$COMPONENT_NAME" >> $GITHUB_OUTPUT
            echo "COMPONENT_VERSION=$COMPONENT_VERSION" >> $GITHUB_OUTPUT
            echo "BUILD_TYPE=$BUILD_TYPE" >> $GITHUB_OUTPUT
            echo "📋 Tag解析: TAG_NAME=$TAG_NAME, COMPONENT_NAME=$COMPONENT_NAME, COMPONENT_VERSION=$COMPONENT_VERSION, BUILD_TYPE=$BUILD_TYPE"
          else
            echo "BUILD_TYPE=full" >> $GITHUB_OUTPUT
            echo "📋 非tag触发，BUILD_TYPE=full"
          fi

      - name: Prepare dist directory
        if: steps.tag_info.outputs.BUILD_TYPE != 'skip'
        run: mkdir -p dist

      # ══════════════════════════════════════════════════
      #  ARM32 构建 — 调用 Python 脚本替代内联 Bash
      # ══════════════════════════════════════════════════
      - name: Build ARM32 Packages
        if: steps.tag_info.outputs.BUILD_TYPE != 'skip'
        uses: uraimo/run-on-arch-action@v3
        with:
          arch: armv7
          distro: ${{ inputs.distro || 'bullseye' }}
          githubToken: ${{ github.token }}
          install: |
            apt-get update -qq
            apt-get install -y -qq \
              python3 \
              build-essential libffi-dev libssl-dev \
              libbz2-dev libreadline-dev libsqlite3-dev zlib1g-dev \
              wget git file ca-certificates tar gzip \
              gcc g++ make patchelf
            echo "✅ 系统依赖安装完成"
            mkdir -p /etc/pip
            cat > /etc/pip/pip.conf <<EOF
            [global]
            extra-index-url=https://www.piwheels.org/simple
            timeout=120
            retries=5
            EOF
          run: |
            BUILD_TYPE="${{ steps.tag_info.outputs.BUILD_TYPE || 'full' }}"
            TARGET_COMPONENT="${{ steps.tag_info.outputs.COMPONENT_NAME || '' }}"
            TARGET_VERSION="${{ steps.tag_info.outputs.COMPONENT_VERSION || '' }}"
            ENABLE_NUITKA="${{ inputs.enable_nuitka || 'true' }}"
            echo "📋 环境变量: BUILD_TYPE=${BUILD_TYPE}, TARGET_COMPONENT=${TARGET_COMPONENT}, TARGET_VERSION=${TARGET_VERSION}"
            python3 scripts/arm32_build.py \
              --build-type "${BUILD_TYPE}" \
              --target-component "${TARGET_COMPONENT}" \
              --target-version "${TARGET_VERSION}" \
              --python-version "${{ env.PYTHON_VERSION }}" \
              --pbs-release "${{ env.PBS_RELEASE }}" \
              --enable-nuitka "${ENABLE_NUITKA}" \
              --strip-stdlib "${{ inputs.strip_stdlib || 'true' }}"

      # ══════════════════════════════════════════════════
      #  部署包组装 — 调用 Python 脚本替代内联 Bash
      # ══════════════════════════════════════════════════
      - name: Assemble deployment package
        if: steps.tag_info.outputs.BUILD_TYPE != 'skip'
        run: python3 scripts/generate_deploy.py dist/

      - name: Upload artifacts
        if: steps.tag_info.outputs.BUILD_TYPE != 'skip'
        uses: actions/upload-artifact@v4
        with:
          name: arm32-deployment
          path: dist/

      - name: Build summary
        if: always()
        run: |
          BUILD_TYPE="${{ steps.tag_info.outputs.BUILD_TYPE || 'full' }}"
          if [ "$BUILD_TYPE" = "skip" ]; then
            echo "⚠️ 构建已跳过: 标签对应的组件不存在"
            exit 0
          fi
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **构建类型**: $BUILD_TYPE" >> $GITHUB_STEP_SUMMARY
          echo "- **Nuitka**: ${{ inputs.enable_nuitka || 'true' }}" >> $GITHUB_STEP_SUMMARY
          if [ "$BUILD_TYPE" != "app-only" ]; then
            echo "- **Python版本**: ${{ steps.tag_info.outputs.COMPONENT_VERSION || env.PYTHON_VERSION }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 产物" >> $GITHUB_STEP_SUMMARY
          for f in dist/*; do
            [ -f "$f" ] && echo "- \`${f#dist/}\`: $(du -sh $f | cut -f1)" >> $GITHUB_STEP_SUMMARY
          done
