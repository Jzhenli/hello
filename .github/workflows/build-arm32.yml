name: Build ARM32 App

on:
  push:
    tags:
      - 'shared-python/v*'
      - '*-linux/v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        type: choice
        options: [app-only, python-only, full]
        default: 'app-only'
      app_name:
        description: 'Application to build (for app-only mode)'
        required: false
        type: choice
        options: [hello, weather, xagent]
        default: 'weather'
      version:
        description: 'Version (e.g., 1.0.0)'
        required: false
        default: ''
      python_version:
        description: 'Python version'
        required: false
        type: choice
        options: ['3.10', '3.11', '3.12']
        default: '3.11'
      distro:
        description: 'Debian distro (bullseye=GLIBC 2.31, bookworm=GLIBC 2.36)'
        required: false
        type: choice
        options: [bullseye, bookworm]
        default: 'bullseye'
      strip_stdlib:
        description: 'Strip unused stdlib modules (~3 MB)'
        required: false
        type: boolean
        default: true
      enable_nuitka:
        description: 'Enable Nuitka compilation'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      build_type: ${{ steps.vars.outputs.build_type }}
      component: ${{ steps.vars.outputs.component }}
      version: ${{ steps.vars.outputs.version }}
      pbs_release: ${{ steps.versions.outputs.pbs_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Read versions from config
        id: versions
        run: |
          PR=$(python3 -c "import sys; sys.path.insert(0,'scripts'); from config import PBS_RELEASE; print(PBS_RELEASE)")
          echo "pbs_release=$PR" >> $GITHUB_OUTPUT

      - name: Resolve variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUILD_TYPE="${{ inputs.build_type }}"
            COMPONENT="${{ inputs.app_name }}"
            VERSION="${{ inputs.version }}"
            [ "$BUILD_TYPE" = "python-only" ] && COMPONENT="shared-python"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            PREFIX=${TAG%/*}
            VERSION=${TAG#*/v}
            VERSION=${VERSION#v}
            if [ "$PREFIX" = "shared-python" ]; then
              BUILD_TYPE="python-only"
              COMPONENT="shared-python"
            elif [[ "$PREFIX" == *-linux ]]; then
              COMPONENT=${PREFIX%-linux}
              if [ -d "apps/$COMPONENT" ]; then
                BUILD_TYPE="app-only"
              else
                BUILD_TYPE="skip"
              fi
            else
              BUILD_TYPE="skip"
              COMPONENT=""
            fi
          else
            BUILD_TYPE="full"
            COMPONENT=""
            VERSION=""
          fi
          
          [ -z "$VERSION" ] && VERSION="dev"
          [ "$BUILD_TYPE" = "app-only" ] && [ ! -d "apps/$COMPONENT" ] && { echo "::error::App '$COMPONENT' not found"; BUILD_TYPE="skip"; }
          
          echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT
          echo "component=$COMPONENT" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build:
    needs: config
    if: needs.config.outputs.build_type != 'skip'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Build on ARM32
        uses: uraimo/run-on-arch-action@v3
        with:
          arch: armv7
          distro: ${{ inputs.distro || 'bullseye' }}
          githubToken: ${{ github.token }}
          install: |
            apt-get update -qq
            apt-get install -y -qq python3 build-essential libffi-dev libssl-dev \
              libbz2-dev libreadline-dev libsqlite3-dev zlib1g-dev \
              wget git file ca-certificates tar gzip gcc g++ make patchelf
            mkdir -p /etc/pip
            cat > /etc/pip/pip.conf <<EOF
            [global]
            extra-index-url=https://www.piwheels.org/simple
            timeout=120
            retries=5
            EOF
          run: |
            python3 scripts/arm32_build.py \
              --build-type "${{ needs.config.outputs.build_type }}" \
              --target-component "${{ needs.config.outputs.component }}" \
              --target-version "${{ needs.config.outputs.version }}" \
              --python-version "${{ inputs.python_version || '3.11' }}" \
              --pbs-release "${{ needs.config.outputs.pbs_release }}" \
              --enable-nuitka "${{ inputs.enable_nuitka || 'true' }}" \
              --strip-stdlib "${{ inputs.strip_stdlib || 'true' }}"

      - name: Assemble deployment
        run: |
          sudo chown -R $(whoami):$(id -gn) dist/ 2>/dev/null || true
          chmod -R u+rw dist/ 2>/dev/null || true
          python3 scripts/generate_deploy.py dist/

      - uses: actions/upload-artifact@v4
        with:
          name: arm32-deployment
          path: dist/

      - name: Summary
        if: always()
        run: |
          echo "### ARM32 Build" >> $GITHUB_STEP_SUMMARY
          echo "- **Type**: ${{ needs.config.outputs.build_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Component**: ${{ needs.config.outputs.component }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ needs.config.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Nuitka**: ${{ inputs.enable_nuitka || 'true' }}" >> $GITHUB_STEP_SUMMARY
