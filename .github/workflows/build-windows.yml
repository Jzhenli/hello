name: Build Windows App

on:
  push:
    tags:
      - '*-windows/v*'
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Application to build'
        required: true
        default: 'weather'
        type: choice
        options: [hello, weather, xagent]
      version:
        description: 'Version (e.g., 1.0.0)'
        required: false
        default: ''
      python_version:
        description: 'Python version'
        required: false
        type: choice
        options: ['3.10', '3.11', '3.12']
        default: '3.11'
      enable_nuitka:
        description: 'Enable Nuitka compilation'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      app_name: ${{ steps.vars.outputs.app_name }}
      version: ${{ steps.vars.outputs.version }}
      enable_nuitka: ${{ steps.vars.outputs.enable_nuitka }}
      briefcase_version: ${{ steps.versions.outputs.briefcase }}
      nuitka_version: ${{ steps.versions.outputs.nuitka }}
    steps:
      - uses: actions/checkout@v4

      - name: Read versions from config
        id: versions
        run: |
          BV=$(python3 -c "import sys; sys.path.insert(0,'scripts'); from config import BRIEFCASE_VERSION; print(BRIEFCASE_VERSION)")
          NV=$(python3 -c "import sys; sys.path.insert(0,'scripts'); from config import NUITKA_VERSION; print(NUITKA_VERSION)")
          echo "briefcase=$BV" >> $GITHUB_OUTPUT
          echo "nuitka=$NV" >> $GITHUB_OUTPUT

      - name: Resolve variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            APP_NAME="${{ inputs.app_name }}"
            VERSION="${{ inputs.version }}"
            ENABLE_NUITKA="${{ inputs.enable_nuitka }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            APP_NAME="${TAG%-windows/*}"
            VERSION="${TAG#*/v}"
            ENABLE_NUITKA="true"
          fi
          [ -z "$VERSION" ] && VERSION="dev"
          [ ! -d "apps/$APP_NAME" ] && { echo "::error::App '$APP_NAME' not found"; exit 1; }
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "enable_nuitka=$ENABLE_NUITKA" >> $GITHUB_OUTPUT

  build:
    needs: config
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      PYTHON_VERSION: ${{ inputs.python_version || '3.11' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Briefcase
        run: |
          pip install --upgrade pip
          pip install briefcase==${{ needs.config.outputs.briefcase_version }}

      - name: Install Nuitka
        if: needs.config.outputs.enable_nuitka == 'true'
        run: pip install nuitka==${{ needs.config.outputs.nuitka_version }} ordered-set zstandard imageio

      - name: Setup MSVC
        if: needs.config.outputs.enable_nuitka == 'true'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Update version
        if: needs.config.outputs.version != 'dev'
        shell: bash
        working-directory: apps/${{ needs.config.outputs.app_name }}
        run: |
          python -c "
          import sys; sys.path.insert(0, '$GITHUB_WORKSPACE/scripts')
          from utils import set_version_in_pyproject
          set_version_in_pyproject('pyproject.toml', '${{ needs.config.outputs.version }}')
          "

      - name: Create Briefcase project
        working-directory: apps/${{ needs.config.outputs.app_name }}
        run: briefcase create windows

      - name: Compile with Nuitka
        if: needs.config.outputs.enable_nuitka == 'true'
        shell: bash
        working-directory: apps/${{ needs.config.outputs.app_name }}
        run: |
          python "$GITHUB_WORKSPACE/scripts/nuitka_compile.py" \
            "build/${{ needs.config.outputs.app_name }}/windows/app/src/app"

      - name: Build & Package
        working-directory: apps/${{ needs.config.outputs.app_name }}
        run: |
          briefcase build windows
          briefcase package windows --adhoc-sign -p zip

      - name: Collect artifacts
        shell: bash
        working-directory: apps/${{ needs.config.outputs.app_name }}
        run: |
          mkdir -p dist
          APP="${{ needs.config.outputs.app_name }}"
          VER="${{ needs.config.outputs.version }}"
          TITLE="$(echo ${APP:0:1} | tr a-z A-Z)${APP:1}"
          [ -d "build/${APP}/windows/app/${TITLE}" ] && cp -r "build/${APP}/windows/app/${TITLE}" "dist/${APP}-${VER}-windows"
          [ -f "build/${APP}/windows/app/${TITLE}.zip" ] && cp "build/${APP}/windows/app/${TITLE}.zip" "dist/${APP}-${VER}-windows.zip"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-${{ needs.config.outputs.app_name }}-${{ needs.config.outputs.version }}
          path: apps/${{ needs.config.outputs.app_name }}/dist/

      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "### Windows Build" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: ${{ needs.config.outputs.app_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ needs.config.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Nuitka**: ${{ needs.config.outputs.enable_nuitka }}" >> $GITHUB_STEP_SUMMARY
