name: Build ARM32 Shared AppDir

on:
  push:
    tags:
      - 'shared-python/v*'
      - '*/v*'
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version (3.10 / 3.11 / 3.12)'
        required: false
        default: '3.11'
      strip_stdlib:
        description: 'Strip unused stdlib modules (saves ~3 MB)'
        required: false
        type: boolean
        default: true
      enable_nuitka:
        description: 'Enable Nuitka compilation'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

env:
  PYTHON_VERSION: ${{ inputs.python_version || '3.11' }}
  PBS_RELEASE: '20260508'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract tag info
        id: tag_info
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            COMPONENT_NAME=${TAG_NAME%/*}
            COMPONENT_VERSION=${TAG_NAME#*/v}
            COMPONENT_VERSION=${COMPONENT_VERSION#v}
            
            if [ "$COMPONENT_NAME" = "shared-python" ]; then
              BUILD_TYPE="python-only"
            elif [ -d "apps/$COMPONENT_NAME" ]; then
              BUILD_TYPE="app-only"
            else
              echo "вЪ†пЄП ж†Зз≠Њ $TAG_NAME еѓєеЇФзЪДзїДдїґ apps/$COMPONENT_NAME дЄНе≠ШеЬ®пЉМиЈ≥ињЗжЮДеїЇ"
              BUILD_TYPE="skip"
            fi
            
            echo "COMPONENT_NAME=$COMPONENT_NAME" >> $GITHUB_OUTPUT
            echo "COMPONENT_VERSION=$COMPONENT_VERSION" >> $GITHUB_OUTPUT
            echo "BUILD_TYPE=$BUILD_TYPE" >> $GITHUB_OUTPUT
            echo "рЯФН ж†Зз≠Њ: $TAG_NAME вЖТ з±їеЮЛ: $BUILD_TYPE, зїДдїґ: $COMPONENT_NAME, зЙИжЬђ: $COMPONENT_VERSION"
          else
            echo "BUILD_TYPE=full" >> $GITHUB_OUTPUT
            echo "рЯЪА жЙЛеК®иІ¶еПС вЖТ еЕ®йЗПжЮДеїЇж®°еЉП"
          fi

      - name: Prepare dist directory
        if: steps.tag_info.outputs.BUILD_TYPE != 'skip'
        run: mkdir -p dist

      - name: Build ARM32 Packages
        if: steps.tag_info.outputs.BUILD_TYPE != 'skip'
        uses: uraimo/run-on-arch-action@v3
        env:
          BUILD_TYPE: ${{ steps.tag_info.outputs.BUILD_TYPE || 'full' }}
          TARGET_COMPONENT: ${{ steps.tag_info.outputs.COMPONENT_NAME || '' }}
          TARGET_VERSION: ${{ steps.tag_info.outputs.COMPONENT_VERSION || '' }}
          ENABLE_NUITKA: ${{ inputs.enable_nuitka || 'true' }}
        with:
          arch: armv7
          distro: bookworm
          githubToken: ${{ github.token }}
          install: |
            apt-get update -qq
            apt-get install -y -qq \
            build-essential libffi-dev libssl-dev \
            libbz2-dev libreadline-dev libsqlite3-dev zlib1g-dev \
            wget git file ca-certificates tar gzip \
            gcc g++ make patchelf
            echo "вЬЕ з≥їзїЯдЊЭиµЦеЃЙи£ЕеЃМжИР"
            mkdir -p /etc/pip
            cat > /etc/pip/pip.conf <<EOF
            [global]
            extra-index-url=https://www.piwheels.org/simple
            timeout=120
            retries=5
            EOF
          run: |
            set -e
            PYTHON_VERSION="${{ env.PYTHON_VERSION }}"
            PBS_RELEASE="${{ env.PBS_RELEASE }}"
            BUILD_TYPE="${BUILD_TYPE:-full}"
            TARGET_COMPONENT="${TARGET_COMPONENT:-}"
            TARGET_VERSION="${TARGET_VERSION:-}"
            ENABLE_NUITKA="${ENABLE_NUITKA:-true}"
            
            if [ "$BUILD_TYPE" = "full" ]; then
              echo "рЯЪА еЕ®йЗПжЮДеїЇж®°еЉП"
            elif [ "$BUILD_TYPE" = "python-only" ]; then
              echo "рЯРН дїЕжЮДеїЇ Shared Python"
            elif [ "$BUILD_TYPE" = "app-only" ]; then
              echo "рЯОѓ дїЕжЮДеїЇеЇФзФ®: $TARGET_COMPONENT"
            fi
            echo "Nuitka зЉЦиѓС: $ENABLE_NUITKA"

            mkdir -p dist

            NEED_PACKAGE_PYTHON=false
            if [ "$BUILD_TYPE" = "full" ] || [ "$BUILD_TYPE" = "python-only" ]; then
              NEED_PACKAGE_PYTHON=true
            fi

            echo "=========================================="
            echo " еЗЖе§З: shared-python зОѓеҐГ"
            echo " жШѓеР¶жЙУеМЕдЇІзЙ©: $NEED_PACKAGE_PYTHON"
            echo "=========================================="
            
            case "$PYTHON_VERSION" in
              3.10) PBS_PYTHON="3.10.16" ;;
              3.11) PBS_PYTHON="3.11.15" ;;
              3.12) PBS_PYTHON="3.12.13" ;;
              *) PBS_PYTHON="$PYTHON_VERSION" ;;
            esac

            PBS_URL="https://github.com/astral-sh/python-build-standalone/releases/download/${PBS_RELEASE}/cpython-${PBS_PYTHON}+${PBS_RELEASE}-armv7-unknown-linux-gnueabihf-install_only_stripped.tar.gz"
            
            wget -q "$PBS_URL" -O /tmp/pbs.tar.gz || { echo "вЭМ дЄЛиљље§±иі•"; exit 1; }
            tar xzf /tmp/pbs.tar.gz -C /tmp/

            PBS_DIR="/tmp/python"
            if [ ! -d "$PBS_DIR" ]; then
              PBS_DIR=$(find /tmp -maxdepth 1 -type d -name "cpython*" | head -1)
            fi
            if [ -z "$PBS_DIR" ] || [ ! -d "$PBS_DIR" ]; then
              echo "вЭМ жЧ†ж≥ХжЙЊеИ∞иІ£еОЛеРОзЪД Python зЫЃељХ"
              exit 1
            fi
            
            mkdir -p shared-python
            cp -a "$PBS_DIR/." shared-python/
            PYLIB=$(ls -d shared-python/lib/python3.* 2>/dev/null | head -1)

            if [ "${{ inputs.strip_stdlib || 'true' }}" = "true" ]; then
              for mod in tkinter idlelib lib2to3 unittest pydoc_data curses tty webbrowser; do
                rm -rf "$PYLIB/$mod" 2>/dev/null || true
              done
              find "$PYLIB" -type d \( -name __pycache__ -o -name test -o -name tests \) -exec rm -rf {} + 2>/dev/null || true
              rm -rf shared-python/include
            fi

            if [ "$BUILD_TYPE" = "python-only" ]; then
              PY_VER="${TARGET_VERSION:-${PBS_PYTHON}-${PBS_RELEASE}}"
            else
              PY_VER="${PBS_PYTHON}-${PBS_RELEASE}"
            fi
            echo "$PY_VER" > shared-python/VERSION
            
            if [ "$NEED_PACKAGE_PYTHON" = true ]; then
              tar czf dist/shared-python-base-arm32.tar.gz shared-python/
              echo "вЬЕ shared-python ($PY_VER) еЈ≤жЙУеМЕеИ∞ dist/"
            else
              echo "вЬЕ shared-python зОѓеҐГеЈ≤еЗЖе§З (дїЕзФ®дЇО pip installпЉМдЄНжЙУеМЕдЇІзЙ©)"
            fi

            BUILD_APPS=""
            if [ "$BUILD_TYPE" = "full" ]; then
              BUILD_APPS=$(ls -d apps/*/ 2>/dev/null | xargs -n1 basename || true)
            elif [ "$BUILD_TYPE" = "app-only" ]; then
              if [ -d "apps/$TARGET_COMPONENT" ]; then
                BUILD_APPS="$TARGET_COMPONENT"
              else
                echo "вЭМ йФЩиѓѓ: зЫЃељХ apps/$TARGET_COMPONENT дЄНе≠ШеЬ®"
                exit 1
              fi
            fi

            if [ -n "$BUILD_APPS" ]; then
              PYTHON="$(pwd)/shared-python/bin/python3"
              if [ -x "$(pwd)/shared-python/bin/pip3" ]; then
                PIP="$(pwd)/shared-python/bin/pip3"
              else
                PIP="$PYTHON -m pip"
              fi

              if [ "$ENABLE_NUITKA" = "true" ]; then
                echo "--- еЃЙи£Е Nuitka ---"
                $PIP install nuitka ordered-set zstandard
              fi

              for APP_NAME in $BUILD_APPS; do
                echo "=========================================="
                echo " жЮДеїЇ: $APP_NAME"
                echo "=========================================="

                APP_DIR="apps/$APP_NAME"
                BUILD_DIR="build/${APP_NAME}"
                rm -rf "$BUILD_DIR"
                mkdir -p "$BUILD_DIR/usr/app"
                mkdir -p "$BUILD_DIR/usr/app_packages"

                if [ -d "$APP_DIR/src" ]; then
                  cp -a "$APP_DIR/src/." "$BUILD_DIR/usr/app/"
                else
                  cp -a "$APP_DIR"/*.py "$BUILD_DIR/usr/app/" 2>/dev/null || true
                fi

                if [ -f "$APP_DIR/requirements.txt" ]; then
                  echo "--- еЃЙи£ЕдЊЭиµЦ ---"
                  $PIP install --target "$BUILD_DIR/usr/app_packages" -r "$APP_DIR/requirements.txt" 2>&1 | tail -5
                fi

                if [ -d "$BUILD_DIR/usr/app/$APP_NAME" ] && [ -f "$BUILD_DIR/usr/app/$APP_NAME/__main__.py" ]; then
                  MODULE_NAME="$APP_NAME"
                elif [ -f "$BUILD_DIR/usr/app/__main__.py" ]; then
                  MODULE_NAME=$(find "$BUILD_DIR/usr/app" -mindepth 2 -name "__main__.py" -type f | head -1 | xargs dirname | xargs basename)
                  MODULE_NAME=${MODULE_NAME:-$APP_NAME}
                else
                  MODULE_NAME="$APP_NAME"
                fi

                if [ "$BUILD_TYPE" = "app-only" ] && [ -n "$TARGET_VERSION" ]; then
                  APP_VERSION="$TARGET_VERSION"
                else
                  INIT_FILE="$APP_DIR/src/$MODULE_NAME/__init__.py"
                  if [ -f "$INIT_FILE" ]; then
                    APP_VERSION=$(grep '^__version__' "$INIT_FILE" | head -1 | awk -F'["'"'"']' '{print $2}')
                    APP_VERSION=${APP_VERSION:-0.0.0}
                  else
                    APP_VERSION="0.0.0"
                  fi
                fi
                
                echo "$APP_VERSION" > "$BUILD_DIR/VERSION"
                echo "ж®°еЭЧеРН: $MODULE_NAME, зЙИжЬђ: $APP_VERSION"

                if [ "$ENABLE_NUITKA" = "true" ]; then
                  echo "--- Nuitka зЉЦиѓСж®°еЭЧ ---"
                  cd "$BUILD_DIR/usr/app"
                  
                  for module_dir in */ ; do
                    mod_name="${module_dir%/}"
                    
                    if [ "$mod_name" = "__pycache__" ] || [ ! -f "$mod_name/__init__.py" ]; then
                      continue
                    fi
                    
                    echo "зЉЦиѓСж®°еЭЧ: $mod_name"
                    
                    $PYTHON -m nuitka \
                      --module "$mod_name" \
                      --output-dir=./compiled \
                      --remove-output \
                      --assume-yes-for-downloads \
                      --nofollow-imports \
                      --follow-import-to="$mod_name" \
                      --no-progressbar 2>&1 | tail -10
                  done
                  
                  echo "--- зІїеК®зЉЦиѓСдЇІзЙ© ---"
                  if [ -d "./compiled" ]; then
                    for so_file in ./compiled/*.so; do
                      if [ -f "$so_file" ]; then
                        cp "$so_file" ./
                        echo "еЈ≤е§НеИґ: $(basename $so_file)"
                      fi
                    done
                  fi
                  
                  echo "--- еИЫеїЇеЕ•еП£жЦЗдїґеєґжЄЕзРЖжЇРз†Б ---"
                  for module_dir in */ ; do
                    mod_name="${module_dir%/}"
                    if [ "$mod_name" = "__pycache__" ] || [ "$mod_name" = "compiled" ]; then
                      continue
                    fi
                    
                    so_pattern="${mod_name}.cpython-*.so"
                    
                    if ls $so_pattern 1> /dev/null 2>&1; then
                      if [ -f "$module_dir/__main__.py" ]; then
                        echo "еИЫеїЇеЕ•еП£жЦЗдїґ: ${mod_name}/__init__.py"
                        
                        so_file=$(ls $so_pattern | head -1)
                        so_basename=$(basename "$so_file")
                        
                        echo 'import sys' > "$mod_name/__init__.py"
                        echo 'import os' >> "$mod_name/__init__.py"
                        echo 'import importlib.util' >> "$mod_name/__init__.py"
                        echo '' >> "$mod_name/__init__.py"
                        echo "_so_path = os.path.join(os.path.dirname(__file__), \"..\", \"${so_basename}\")" >> "$mod_name/__init__.py"
                        echo '_spec = importlib.util.spec_from_file_location("_compiled_module", _so_path)' >> "$mod_name/__init__.py"
                        echo '_module = importlib.util.module_from_spec(_spec)' >> "$mod_name/__init__.py"
                        echo '_spec.loader.exec_module(_module)' >> "$mod_name/__init__.py"
                        echo 'sys.modules["${mod_name}"] = _module' >> "$mod_name/__init__.py"
                        
                        echo 'import sys' > "$module_dir/__main__.py"
                        echo 'import os' >> "$module_dir/__main__.py"
                        echo 'import importlib.util' >> "$module_dir/__main__.py"
                        echo '' >> "$module_dir/__main__.py"
                        echo "_so_path = os.path.join(os.path.dirname(__file__), \"..\", \"${so_basename}\")" >> "$module_dir/__main__.py"
                        echo '_spec = importlib.util.spec_from_file_location("_compiled_module", _so_path)' >> "$module_dir/__main__.py"
                        echo '_module = importlib.util.module_from_spec(_spec)' >> "$module_dir/__main__.py"
                        echo '_spec.loader.exec_module(_module)' >> "$module_dir/__main__.py"
                        echo '' >> "$module_dir/__main__.py"
                        echo 'if hasattr(_module, "main"):' >> "$module_dir/__main__.py"
                        echo '    _module.main()' >> "$module_dir/__main__.py"
                        echo 'else:' >> "$module_dir/__main__.py"
                        echo '    print("Error: No main() function found")' >> "$module_dir/__main__.py"
                        echo '    sys.exit(1)' >> "$module_dir/__main__.py"
                        
                        echo "еЈ≤еИЫеїЇеЕ•еП£жЦЗдїґ"
                      else
                        echo "зІїйЩ§жЇРз†БзЫЃељХ: $mod_name"
                        rm -rf "$mod_name"
                      fi
                    fi
                  done
                  
                  rm -rf ./compiled 2>/dev/null || true
                  
                  echo "=== Nuitka зЉЦиѓСеЃМжИР ==="
                  ls -la *.so 2>/dev/null || echo "жЬ™жЙЊеИ∞ .so жЦЗдїґ"
                  
                  echo ""
                  echo "жЬАзїИзЫЃељХзїУжЮД:"
                  ls -la
                  
                  cd - > /dev/null
                fi

                cat > "$BUILD_DIR/run.sh" << RUNEOF
            #!/bin/bash
            SCRIPT_DIR="\$(dirname "\$(readlink -f "\${BASH_SOURCE[0]}")")"
            PYTHON="/opt/shared-python/bin/python3"

            if [ ! -x "\$PYTHON" ]; then
                echo "йФЩиѓѓ: жЬ™жЙЊеИ∞еЕ±дЇЂ Python" >&2; exit 1
            fi

            export PYTHONPATH="\${SCRIPT_DIR}/usr/app:\${SCRIPT_DIR}/usr/app_packages"
            export LD_LIBRARY_PATH="/opt/shared-python/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
            export APP_VERSION="${APP_VERSION}"

            exec -a "${MODULE_NAME}" "\$PYTHON" -s -m ${MODULE_NAME} "\$@"
            RUNEOF
                chmod +x "$BUILD_DIR/run.sh"

                find "$BUILD_DIR/usr/app_packages" -type d \( -name "*.dist-info" -o -name "*.egg-info" -o -name "tests" -o -name "test" \) -exec rm -rf {} + 2>/dev/null || true
                find "$BUILD_DIR" -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
                find "$BUILD_DIR" -type f \( -name "*.pyc" -o -name "*.pyo" \) -delete 2>/dev/null || true

                tar czf "dist/${APP_NAME}-arm32.tar.gz" -C build "$APP_NAME"
                echo "вЬЕ $APP_NAME ($APP_VERSION) еЈ≤жЙУеМЕеИ∞ dist/"
              done
            fi
            
            find dist -type d -exec chmod 755 {} +
            find dist -type f -exec chmod 644 {} +
            chmod +x dist/install.sh 2>/dev/null || true

      - name: Create smart deployment script
        if: steps.tag_info.outputs.BUILD_TYPE != 'skip'
        run: |
          mkdir -p dist
          cat > dist/install.sh <<'INSTALL_EOF'
          #!/bin/bash
          # ================================================
          # ARM32 еЕ±дЇЂ Python еЇФзФ® - жЩЇиГљйГ®зљ≤/еНЗзЇІиДЪжЬђ
          # иЗ™еК®иѓЖеИЂеМЕз±їеЮЛпЉМж†°й™МеРИж≥ХжАІпЉМйҐДиІИеПШжЫі
          # ================================================
          set -e

          INSTALL_DIR="/opt"
          SHARED_PYTHON_DIR="${INSTALL_DIR}/shared-python"
          VERSIONS_FILE="${INSTALL_DIR}/versions"
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"

          RED='\033[0;31m'
          GREEN='\033[0;32m'
          YELLOW='\033[1;33m'
          CYAN='\033[0;36m'
          BOLD='\033[1m'
          NC='\033[0m'

          FORCE_MODE=false
          YES_MODE=false

          log_info()  { echo -e "${GREEN}[INFO]${NC} $1"; }
          log_warn()  { echo -e "${YELLOW}[WARN]${NC} $1"; }
          log_error() { echo -e "${RED}[ERROR]${NC} $1"; }
          log_step()  { echo -e "${CYAN}--- $1 ---${NC}"; }

          check_root() {
            if [ "$(id -u)" -ne 0 ]; then
              log_error "йЬАи¶Б root жЭГйЩРпЉМиѓЈдљњзФ®: sudo $0 $@"
              exit 1
            fi
          }

          read_version_from_tar() {
            local tar_file="$1"
            local inner_path="$2"
            tar xzf "$tar_file" -O "$inner_path" 2>/dev/null || echo "unknown"
          }

          read_installed_version() {
            local component="$1"
            local dir="${INSTALL_DIR}/${component}"
            if [ -f "$dir/VERSION" ]; then
              cat "$dir/VERSION"
            else
              echo "unknown"
            fi
          }

          HAS_PYTHON_PKG=false
          APP_TARS=()

          scan_package() {
            cd "$SCRIPT_DIR"

            if [ -f "shared-python-base-arm32.tar.gz" ]; then
              HAS_PYTHON_PKG=true
            fi

            for tar_file in *-arm32.tar.gz; do
              [ "$tar_file" = "shared-python-base-arm32.tar.gz" ] && continue
              [ ! -f "$tar_file" ] && continue
              APP_TARS+=("$tar_file")
            done
          }

          get_package_type() {
            if $HAS_PYTHON_PKG && [ ${#APP_TARS[@]} -gt 0 ]; then
              echo "full"
            elif $HAS_PYTHON_PKG && [ ${#APP_TARS[@]} -eq 0 ]; then
              echo "python-only"
            elif ! $HAS_PYTHON_PKG && [ ${#APP_TARS[@]} -gt 0 ]; then
              echo "app-only"
            else
              echo "empty"
            fi
          }

          get_package_type_label() {
            case "$1" in
              full)         echo "еЕ®йЗПеМЕ (Python + еЇФзФ®)" ;;
              python-only)  echo "Python еНЗзЇІеМЕ" ;;
              app-only)     echo "еЇФзФ®еҐЮйЗПеНЗзЇІеМЕ" ;;
              empty)        echo "з©ЇеМЕ" ;;
            esac
          }

          PYTHON_INSTALLED=false
          INSTALLED_APPS=()

          scan_installed() {
            if [ -d "$SHARED_PYTHON_DIR" ] && [ -x "$SHARED_PYTHON_DIR/bin/python3" ]; then
              PYTHON_INSTALLED=true
            fi

            for app_dir in "${INSTALL_DIR}"/*/; do
              [ ! -d "$app_dir" ] && continue
              local name=$(basename "$app_dir")
              [ "$name" = "shared-python" ] && continue
              [[ "$name" == *.bak* ]] && continue
              if [ -f "$app_dir/run.sh" ]; then
                INSTALLED_APPS+=("$name")
              fi
            done
          }

          update_versions() {
            local component="$1"
            local version="$2"
            local tmpfile=$(mktemp)
            if [ -f "$VERSIONS_FILE" ]; then
              grep -v "^${component}:" "$VERSIONS_FILE" > "$tmpfile" || true
            else
              > "$tmpfile"
            fi
            echo "${component}:${version}" >> "$tmpfile"
            mv "$tmpfile" "$VERSIONS_FILE"
          }

          show_versions() {
            echo ""
            echo -e "========================================"
            echo -e " ${BOLD}ељУеЙНеЈ•жОІжЬЇеЈ≤еЃЙи£ЕзЙИжЬђ${NC}"
            echo -e "========================================"
            if [ -f "$VERSIONS_FILE" ]; then
              printf "  %-20s %s\n" "зїДдїґ" "зЙИжЬђ"
              printf "  %-20s %s\n" "----" "----"
              while IFS=: read -r comp ver; do
                printf "  %-20s %s\n" "$comp" "$ver"
              done < "$VERSIONS_FILE"
            else
              log_warn "жЬ™жЙЊеИ∞зЙИжЬђиЃ∞ељХжЦЗдїґ $VERSIONS_FILE"
            fi
            echo ""
          }

          backup_app() {
            local APP_DIR="$1"
            if [ -d "$APP_DIR" ]; then
              local OLD_VERSION=$(cat "$APP_DIR/VERSION" 2>/dev/null || echo "unknown")
              local BACKUP_DIR="${APP_DIR}.bak.$(date +%Y%m%d_%H%M%S)_v${OLD_VERSION}"
              log_info "е§Здїљ: $(basename $APP_DIR) ($OLD_VERSION) вЖТ $(basename $BACKUP_DIR)"
              cp -a "$APP_DIR" "$BACKUP_DIR"
              touch "$BACKUP_DIR"
              find "$INSTALL_DIR" -maxdepth 1 -name "*.bak.*" -type d -mtime +7 -exec rm -rf {} + 2>/dev/null || true
            fi
          }

          install_shared_python() {
            log_step "еЃЙи£ЕеЕ±дЇЂ Python"

            local NEW_DIR="${SHARED_PYTHON_DIR}.new"
            rm -rf "$NEW_DIR"

            tar xzf shared-python-base-arm32.tar.gz -C "$INSTALL_DIR/"
            mv "$SHARED_PYTHON_DIR" "$NEW_DIR"
            rm -f "$NEW_DIR/bin/pip"* 2>/dev/null || true

            if [ ! -x "$NEW_DIR/bin/python3" ]; then
              log_error "жЦ∞ Python зОѓеҐГж†°й™Ме§±иі•: python3 дЄНеПѓжЙІи°М"
              rm -rf "$NEW_DIR"
              exit 1
            fi

            if [ -d "$SHARED_PYTHON_DIR" ]; then
              backup_app "$SHARED_PYTHON_DIR"
              mv "$SHARED_PYTHON_DIR" "${SHARED_PYTHON_DIR}.old"
            fi

            mv "$NEW_DIR" "$SHARED_PYTHON_DIR"
            rm -rf "${SHARED_PYTHON_DIR}.old"

            local new_ver=$(cat "$SHARED_PYTHON_DIR/VERSION")
            update_versions "shared-python" "$new_ver"
            log_info "еЕ±дЇЂ Python еЈ≤еЃЙи£Е: $new_ver"
          }

          install_app() {
            local APP_TAR="$1"
            local APP_NAME=$(echo "$APP_TAR" | sed "s/-arm32.tar.gz//")
            local APP_DIR="${INSTALL_DIR}/${APP_NAME}"
            local NEW_DIR="${APP_DIR}.new"

            log_step "еЃЙи£ЕеЇФзФ®: $APP_NAME"

            rm -rf "$NEW_DIR"
            mkdir -p "$NEW_DIR"
            tar xzf "$APP_TAR" -C "$NEW_DIR/" --strip-components=1
            chmod +x "$NEW_DIR/run.sh" 2>/dev/null || true

            if [ ! -f "$NEW_DIR/VERSION" ]; then
              log_error "жЦ∞еЇФзФ®ж†°й™Ме§±иі•: VERSION жЦЗдїґзЉЇе§±"
              rm -rf "$NEW_DIR"
              exit 1
            fi

            if [ -d "$APP_DIR" ]; then
              backup_app "$APP_DIR"
              mv "$APP_DIR" "${APP_DIR}.old"
            fi

            mv "$NEW_DIR" "$APP_DIR"
            rm -rf "${APP_DIR}.old"

            rm -f "/usr/local/bin/$APP_NAME" 2>/dev/null || true
            ln -sf "$APP_DIR/run.sh" "/usr/local/bin/$APP_NAME"

            local new_ver=$(cat "$APP_DIR/VERSION")
            update_versions "$APP_NAME" "$new_ver"
            log_info "$APP_NAME еЈ≤еЃЙи£Е: $new_ver вЖТ ињРи°М: $APP_NAME"
          }

          verify_checksums() {
            if [ ! -f "$SCRIPT_DIR/checksums.txt" ]; then
              log_warn "жЬ™жЙЊеИ∞ checksums.txtпЉМиЈ≥ињЗеЃМжХіжАІж†°й™М"
              return 0
            fi
            log_step "ж†°й™МеЃЙи£ЕеМЕеЃМжХіжАІ (SHA256)"
            cd "$SCRIPT_DIR"
            if sha256sum -c checksums.txt 2>/dev/null; then
              log_info "жЙАжЬЙеЃЙи£ЕеМЕж†°й™МйАЪињЗ"
            else
              log_error "еЃЙи£ЕеМЕж†°й™Ме§±иі•пЉБжЦЗдїґеПѓиГљеЈ≤жНЯеЭПжИЦиҐЂзѓ°жФє"
              log_error "иѓЈйЗНжЦ∞дЄЛиљљйГ®зљ≤еМЕ"
              exit 1
            fi
          }

          validate_full_install() {
            if ! $HAS_PYTHON_PKG; then
              log_error "й¶Цжђ°еЃЙи£ЕйЬАи¶Б shared-python-base-arm32.tar.gz"
              log_error "ељУеЙНеМЕдЄЇеЇФзФ®еҐЮйЗПеМЕпЉМиѓЈдљњзФ®еЕ®йЗПйГ®зљ≤еМЕ"
              return 1
            fi
            if [ ${#APP_TARS[@]} -eq 0 ]; then
              log_error "й¶Цжђ°еЃЙи£ЕйЬАи¶БиЗ≥е∞СдЄАдЄ™еЇФзФ®еМЕ"
              log_error "ељУеЙНеМЕдЄЇ Python еНЗзЇІеМЕпЉМиѓЈдљњзФ®еЕ®йЗПйГ®зљ≤еМЕ"
              return 1
            fi
            return 0
          }

          validate_python_upgrade() {
            if ! $HAS_PYTHON_PKG; then
              log_error "еНЗзЇІеЕ±дЇЂ Python йЬАи¶Б shared-python-base-arm32.tar.gz"
              return 1
            fi
            if ! $PYTHON_INSTALLED; then
              log_error "зЫЃж†ЗжЬЇжЬ™еЃЙи£Е shared-pythonпЉМжЧ†ж≥ХжЙІи°МеНЗзЇІ"
              log_error "иѓЈеЕИдљњзФ®еЕ®йЗПйГ®зљ≤еМЕеЃМжИРй¶Цжђ°еЃЙи£Е"
              return 1
            fi
            return 0
          }

          validate_app_upgrade() {
            if ! $PYTHON_INSTALLED; then
              log_error "зЫЃж†ЗжЬЇжЬ™еЃЙи£Е shared-pythonпЉМеЇФзФ®жЧ†ж≥ХињРи°М"
              log_error "иѓЈеЕИдљњзФ®еЕ®йЗПйГ®зљ≤еМЕеЃМжИРй¶Цжђ°еЃЙи£Е"
              return 1
            fi
            if [ ${#APP_TARS[@]} -eq 0 ]; then
              log_error "жЬ™жЙЊеИ∞дїїдљХеЇФзФ®еНЗзЇІеМЕ"
              return 1
            fi
            return 0
          }

          show_preview() {
            local pkg_type="$1"
            local is_first_install="$2"

            echo ""
            echo -e "========================================"
            echo -e " ${BOLD}рЯУ¶ йГ®зљ≤йҐДиІИ${NC}"
            echo -e "========================================"
            echo -e "  еМЕз±їеЮЛ:   ${CYAN}$(get_package_type_label "$pkg_type")${NC}"

            if $is_first_install; then
              echo -e "  з≥їзїЯзКґжАБ: ${YELLOW}жЬ™еЃЙи£Е (й¶Цжђ°йГ®зљ≤)${NC}"
            else
              echo -e "  з≥їзїЯзКґжАБ: ${GREEN}еЈ≤еЃЙи£Е${NC}"
            fi

            echo ""
            echo -e "  ${BOLD}еН≥е∞ЖжЙІи°МзЪДжУНдљЬ:${NC}"

            if $HAS_PYTHON_PKG; then
              if $PYTHON_INSTALLED; then
                local old_py_ver=$(read_installed_version "shared-python")
                local new_py_ver=$(read_version_from_tar "shared-python-base-arm32.tar.gz" "shared-python/VERSION")
                if [ "$old_py_ver" = "$new_py_ver" ]; then
                  echo -e "  ${CYAN}вЙ°${NC} йЗНи£Е shared-python:  $old_py_ver (зЙИжЬђжЬ™еПШ)"
                else
                  echo -e "  ${YELLOW}вЖї${NC} еНЗзЇІ shared-python:  $old_py_ver вЖТ ${GREEN}$new_py_ver${NC}"
                fi
              else
                local new_py_ver=$(read_version_from_tar "shared-python-base-arm32.tar.gz" "shared-python/VERSION")
                echo -e "  ${GREEN}вЬЪ${NC} еЃЙи£Е shared-python:  ${GREEN}$new_py_ver${NC}"
              fi
            fi

            for app_tar in "${APP_TARS[@]}"; do
              local app_name=$(echo "$app_tar" | sed "s/-arm32.tar.gz//")
              local new_ver=$(read_version_from_tar "$app_tar" "$app_name/VERSION")
              local is_installed=false

              for installed in "${INSTALLED_APPS[@]}"; do
                if [ "$installed" = "$app_name" ]; then
                  is_installed=true
                  break
                fi
              done

              if $is_installed; then
                local old_ver=$(read_installed_version "$app_name")
                if [ "$old_ver" = "$new_ver" ]; then
                  echo -e "  ${CYAN}вЙ°${NC} йЗНи£Е $app_name:  $old_ver (зЙИжЬђжЬ™еПШ)"
                else
                  echo -e "  ${YELLOW}вЖї${NC} еНЗзЇІ $app_name:  $old_ver вЖТ ${GREEN}$new_ver${NC}"
                fi
              else
                echo -e "  ${GREEN}вЬЪ${NC} еЃЙи£Е $app_name:  ${GREEN}$new_ver${NC}"
              fi
            done

            echo ""
          }

          show_help() {
            echo ""
            echo "ARM32 еЕ±дЇЂ Python еЇФзФ® - жЩЇиГљйГ®зљ≤иДЪжЬђ"
            echo ""
            echo "Usage:"
            echo "  sudo bash $0                        # жЩЇиГљж®°еЉП: иЗ™еК®иѓЖеИЂеМЕз±їеЮЛеєґйГ®зљ≤"
            echo "  sudo bash $0 --force                # еЉЇеИґж®°еЉП: иЈ≥ињЗз°ЃиЃ§зЫіжО•жЙІи°М"
            echo "  sudo bash $0 -y                     # иЗ™еК®з°ЃиЃ§: иЈ≥ињЗдЇ§дЇТжПРз§Ї"
            echo "  sudo bash $0 --show-versions        # жЯ•зЬЛељУеЙНеЈ≤еЃЙи£ЕзЙИжЬђ"
            echo "  sudo bash $0 --clean-backup         # жЄЕзРЖжЙАжЬЙе§Здїљ"
            echo "  sudo bash $0 --help                 # жШЊз§ЇеЄЃеК©"
            echo ""
            echo "жЩЇиГљиѓЖеИЂиІДеИЩ:"
            echo "  еРЂ shared-python + еЇФзФ®еМЕ  вЖТ  й¶Цжђ°еЃЙи£Е жИЦ еЕ®йЗПеНЗзЇІ"
            echo "  дїЕеРЂ shared-python         вЖТ  Python еНЗзЇІ"
            echo "  дїЕеРЂеЇФзФ®еМЕ                 вЖТ  еЇФзФ®еҐЮйЗПеНЗзЇІ"
            echo "  зЫЃж†ЗжЬЇжЧ† Python + йЭЮеЕ®йЗПеМЕ вЖТ  жЛТзїЭеєґжПРз§Ї"
            echo ""
            exit 0
          }

          while [[ $# -gt 0 ]]; do
            case "$1" in
              --force|-f)  FORCE_MODE=true; shift ;;
              -y|--yes)    YES_MODE=true; shift ;;
              --show-versions) scan_installed; show_versions; exit 0 ;;
              --clean-backup)
                echo "жЄЕзРЖе§ЗдїљжЦЗдїґ..."
                find "$INSTALL_DIR" -maxdepth 1 -name "*.bak.*" -type d -exec rm -rf {} + 2>/dev/null || true
                log_info "е§ЗдїљжЄЕзРЖеЃМжИР"
                exit 0
                ;;
              --help|-h)   show_help ;;
              *)           log_error "жЬ™зЯ•еПВжХ∞: $1"; show_help ;;
            esac
          done

          check_root "$@"

          scan_package
          scan_installed

          verify_checksums

          PKG_TYPE=$(get_package_type)

          FIRST_INSTALL=false
          if ! $PYTHON_INSTALLED; then
            FIRST_INSTALL=true
          fi

          echo ""
          case "$PKG_TYPE" in
            full)
              if $FIRST_INSTALL; then
                validate_full_install || exit 1
                ACTION_LABEL="й¶Цжђ°еЃЙи£Е"
              else
                validate_full_install || exit 1
                ACTION_LABEL="еЕ®йЗПеНЗзЇІ"
              fi
              ;;
            python-only)
              if $FIRST_INSTALL; then
                log_error "з≥їзїЯжЬ™еЃЙи£Е shared-pythonпЉМдїЕ Python еНЗзЇІеМЕжЧ†ж≥ХеЃМжИРй¶Цжђ°еЃЙи£Е"
                log_error "иѓЈдљњзФ®еЕ®йЗПйГ®зљ≤еМЕ (еРЂ Python + иЗ≥е∞СдЄАдЄ™еЇФзФ®)"
                exit 1
              fi
              validate_python_upgrade || exit 1
              ACTION_LABEL="Python еНЗзЇІ"
              ;;
            app-only)
              if $FIRST_INSTALL; then
                log_error "з≥їзїЯжЬ™еЃЙи£Е shared-pythonпЉМеЇФзФ®жЧ†ж≥ХињРи°М"
                log_error "иѓЈдљњзФ®еЕ®йЗПйГ®зљ≤еМЕеЃМжИРй¶Цжђ°еЃЙи£Е"
                exit 1
              fi
              validate_app_upgrade || exit 1
              if [ ${#APP_TARS[@]} -eq 1 ]; then
                ACTION_LABEL="еЇФзФ®еҐЮйЗПеНЗзЇІ ($(echo ${APP_TARS[0]} | sed 's/-arm32.tar.gz//'))"
              else
                ACTION_LABEL="еЇФзФ®еҐЮйЗПеНЗзЇІ (${#APP_TARS[@]} дЄ™еЇФзФ®)"
              fi
              ;;
            empty)
              log_error "ељУеЙНзЫЃељХжЬ™жЙЊеИ∞дїїдљХжЬЙжХИзЪДеЃЙи£ЕеМЕ (*-arm32.tar.gz)"
              exit 1
              ;;
          esac

          show_preview "$PKG_TYPE" "$FIRST_INSTALL"

          if ! $FORCE_MODE && ! $YES_MODE; then
            if [ -t 0 ]; then
              read -p "з°ЃиЃ§жЙІи°М $ACTION_LABEL? (y/N): " confirm
              if [ "$confirm" != "y" ] && [ "$confirm" != "Y" ]; then
                echo "еЈ≤еПЦжґИ"
                exit 0
              fi
            else
              log_warn "йЭЮдЇ§дЇТеЉПзїИзЂѓпЉМдљњзФ® -y жИЦ --force иЈ≥ињЗз°ЃиЃ§"
              exit 1
            fi
          fi

          echo ""
          echo -e "========================================"
          echo -e " ${BOLD}еЉАеІЛжЙІи°М: $ACTION_LABEL${NC}"
          echo -e "========================================"

          if $HAS_PYTHON_PKG; then
            install_shared_python
          fi

          for app_tar in "${APP_TARS[@]}"; do
            install_app "$app_tar"
          done

          echo ""
          echo -e "========================================"
          echo -e " ${GREEN}${BOLD}вЬЕ $ACTION_LABEL еЃМжИРпЉБ${NC}"
          echo -e "========================================"
          show_versions
          INSTALL_EOF
          chmod +x dist/install.sh

      - name: Assemble deployment package
        if: steps.tag_info.outputs.BUILD_TYPE != 'skip'
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt
          echo "вЬЕ ж†°й™МжЦЗдїґеЈ≤зФЯжИР:"
          cat checksums.txt
          echo ""
          echo "=== йГ®зљ≤еМЕеЖЕеЃє ==="
          for f in *; do
            echo "  $(basename $f): $(du -sh $f | cut -f1)"
          done
          echo ""
          if [ -f "dist/shared-python-base-arm32.tar.gz" ]; then
            APP_COUNT=$(ls dist/*-arm32.tar.gz 2>/dev/null | grep -v shared-python | wc -l)
            if [ "$APP_COUNT" -gt 0 ]; then
              echo "рЯУ¶ еМЕз±їеЮЛ: еЕ®йЗПеМЕ (Python + ${APP_COUNT} дЄ™еЇФзФ®)"
            else
              echo "рЯУ¶ еМЕз±їеЮЛ: Python еНЗзЇІеМЕ"
            fi
          else
            APP_COUNT=$(ls dist/*-arm32.tar.gz 2>/dev/null | wc -l)
            echo "рЯУ¶ еМЕз±їеЮЛ: еЇФзФ®еҐЮйЗПеНЗзЇІеМЕ (${APP_COUNT} дЄ™еЇФзФ®)"
          fi

      - name: Upload artifacts
        if: steps.tag_info.outputs.BUILD_TYPE != 'skip'
        uses: actions/upload-artifact@v4
        with:
          name: arm32-deployment
          path: dist/

      - name: Build summary
        if: always()
        run: |
          BUILD_TYPE="${{ steps.tag_info.outputs.BUILD_TYPE || 'full' }}"
          if [ "$BUILD_TYPE" = "skip" ]; then
            echo "вЪ†пЄП жЮДеїЇеЈ≤иЈ≥ињЗ: ж†Зз≠ЊеѓєеЇФзЪДзїДдїґдЄНе≠ШеЬ®"
            exit 0
          fi
          echo "============================================"
          echo " жЮДеїЇеЃМжИРжСШи¶Б"
          echo "============================================"
          echo "жЮДеїЇз±їеЮЛ: $BUILD_TYPE"
          echo "Nuitka зЉЦиѓС: ${{ inputs.enable_nuitka || 'true' }}"
          if [ "$BUILD_TYPE" != "app-only" ]; then
            echo "PythonзЙИжЬђ: ${{ steps.tag_info.outputs.COMPONENT_VERSION || env.PYTHON_VERSION }}"
          fi
          echo "дЇІзЙ©:"
          for f in dist/*; do [ -f "$f" ] && echo "  $(basename $f): $(du -sh $f | cut -f1)"; done
