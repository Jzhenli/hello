name: Build Windows App (Briefcase)

on:
  push:
    tags:
      - '*-windows/v*'
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Application to build'
        required: true
        default: 'weather'
        type: choice
        options:
          - weather
      version:
        description: 'Version (e.g., 1.0.0)'
        required: false
        default: ''
      enable_nuitka:
        description: 'Enable Nuitka compilation'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      - name: Install Nuitka and dependencies
        if: inputs.enable_nuitka == true
        run: |
          pip install nuitka ordered-set zstandard
          pip install imageio

      - name: Setup MSVC for Nuitka
        if: inputs.enable_nuitka == true
        uses: ilammy/msvc-dev-cmd@v1

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: tag_info
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          APP_NAME="${TAG_NAME%-windows/*}"
          VERSION="${TAG_NAME#*/v}"
          echo "APP_NAME=$APP_NAME" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Set build variables
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            APP_NAME="${{ inputs.app_name }}"
            VERSION="${{ inputs.version }}"
            ENABLE_NUITKA="${{ inputs.enable_nuitka }}"
          else
            APP_NAME="${{ steps.tag_info.outputs.APP_NAME }}"
            VERSION="${{ steps.tag_info.outputs.VERSION }}"
            ENABLE_NUITKA="true"
          fi
          [ -z "$VERSION" ] && VERSION="dev"

          echo "APP_NAME=$APP_NAME" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "ENABLE_NUITKA=$ENABLE_NUITKA" >> $GITHUB_OUTPUT

          echo "=== 构建变量 ==="
          echo "APP_NAME: $APP_NAME"
          echo "VERSION: $VERSION"
          echo "ENABLE_NUITKA: $ENABLE_NUITKA"

      - name: Update version in pyproject.toml
        if: steps.vars.outputs.VERSION != 'dev'
        shell: bash
        working-directory: apps/${{ steps.vars.outputs.APP_NAME }}
        run: |
          VERSION="${{ steps.vars.outputs.VERSION }}"
          if [ -f pyproject.toml ]; then
            sed -i "0,/^version = .*/s/^version = .*/version = \"$VERSION\"/" pyproject.toml
            echo "Updated version to $VERSION"
          fi

      - name: Create Briefcase project
        working-directory: apps/${{ steps.vars.outputs.APP_NAME }}
        run: |
          briefcase create windows

      # ══════════════════════════════════════════════════
      #  Nuitka 编译 — 调用跨平台 Python 脚本
      #  [Fix #3] 使用 $GITHUB_WORKSPACE 替代 ${{ github.workspace }}
      # ══════════════════════════════════════════════════
      - name: Compile Python modules with Nuitka
        if: steps.vars.outputs.ENABLE_NUITKA == 'true'
        shell: bash
        working-directory: apps/${{ steps.vars.outputs.APP_NAME }}
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python "$GITHUB_WORKSPACE/scripts/nuitka_compile.py" \
            "build/${{ steps.vars.outputs.APP_NAME }}/windows/app/src/app"

      - name: Build Windows app
        working-directory: apps/${{ steps.vars.outputs.APP_NAME }}
        run: |
          briefcase build windows

      - name: Package Windows app
        working-directory: apps/${{ steps.vars.outputs.APP_NAME }}
        run: |
          briefcase package windows --adhoc-sign -p zip

      - name: Prepare distribution
        shell: bash
        working-directory: apps/${{ steps.vars.outputs.APP_NAME }}
        run: |
          mkdir -p dist
          APP_NAME="${{ steps.vars.outputs.APP_NAME }}"
          VERSION="${{ steps.vars.outputs.VERSION }}"
          APP_TITLE="$(echo ${APP_NAME:0:1} | tr a-z A-Z)${APP_NAME:1}"

          if [ -d "build/${APP_NAME}/windows/app/${APP_TITLE}" ]; then
            cp -r "build/${APP_NAME}/windows/app/${APP_TITLE}" "dist/${APP_NAME}-${VERSION}-windows"
          fi
          if [ -f "build/${APP_NAME}/windows/app/${APP_TITLE}.zip" ]; then
            cp "build/${APP_NAME}/windows/app/${APP_TITLE}.zip" "dist/${APP_NAME}-${VERSION}-windows.zip"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ steps.vars.outputs.APP_NAME }}-${{ steps.vars.outputs.VERSION }}
          path: apps/${{ steps.vars.outputs.APP_NAME }}/dist/

      - name: Build summary
        shell: bash
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: ${{ steps.vars.outputs.APP_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.vars.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: Windows" >> $GITHUB_STEP_SUMMARY
          echo "- **Nuitka**: ${{ steps.vars.outputs.ENABLE_NUITKA }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Artifacts" >> $GITHUB_STEP_SUMMARY
          ls -la apps/${{ steps.vars.outputs.APP_NAME }}/dist/ 2>/dev/null || echo "No artifacts found"
