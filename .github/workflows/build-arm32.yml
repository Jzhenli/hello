name: Build ARM32 App

on:
  push:
    tags:
      - 'shared-python/v*'
      - 'app-*/v*'
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version'
        required: false
        type: choice
        options: ['3.10', '3.11', '3.12']
        default: '3.11'
      distro:
        description: 'Debian distro (bullseye=GLIBC 2.31, bookworm=GLIBC 2.36)'
        required: false
        type: choice
        options: [bullseye, bookworm]
        default: 'bullseye'
      strip_stdlib:
        description: 'Strip unused stdlib modules (~3 MB)'
        required: false
        type: boolean
        default: true
      enable_nuitka:
        description: 'Enable Nuitka compilation'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      build_type: ${{ steps.tag.outputs.build_type }}
      component: ${{ steps.tag.outputs.component }}
      version: ${{ steps.tag.outputs.version }}
      pbs_release: ${{ steps.versions.outputs.pbs_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Read versions from config
        id: versions
        run: |
          PR=$(python3 -c "import sys; sys.path.insert(0,'scripts'); from config import PBS_RELEASE; print(PBS_RELEASE)")
          echo "pbs_release=$PR" >> $GITHUB_OUTPUT

      - name: Extract tag info
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            PREFIX=${TAG%/*}
            VERSION=${TAG#*/v}
            VERSION=${VERSION#v}
            if [ "$PREFIX" = "shared-python" ]; then
              BUILD_TYPE="python-only"
              COMPONENT="shared-python"
            elif [[ "$PREFIX" == app-* ]]; then
              COMPONENT=${PREFIX#app-}
              if [ -d "apps/$COMPONENT" ]; then
                BUILD_TYPE="app-only"
              else
                BUILD_TYPE="skip"
              fi
            else
              BUILD_TYPE="skip"
              COMPONENT=""
            fi
            echo "component=$COMPONENT" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            BUILD_TYPE="full"
            echo "component=" >> $GITHUB_OUTPUT
            echo "version=" >> $GITHUB_OUTPUT
          fi
          echo "build_type=$BUILD_TYPE" >> $GITHUB_OUTPUT

  build:
    needs: config
    if: needs.config.outputs.build_type != 'skip'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Build on ARM32
        uses: uraimo/run-on-arch-action@v3
        with:
          arch: armv7
          distro: ${{ inputs.distro || 'bullseye' }}
          githubToken: ${{ github.token }}
          install: |
            apt-get update -qq
            apt-get install -y -qq python3 build-essential libffi-dev libssl-dev \
              libbz2-dev libreadline-dev libsqlite3-dev zlib1g-dev \
              wget git file ca-certificates tar gzip gcc g++ make patchelf
            mkdir -p /etc/pip
            cat > /etc/pip/pip.conf <<EOF
            [global]
            extra-index-url=https://www.piwheels.org/simple
            timeout=120
            retries=5
            EOF
          run: |
            python3 scripts/arm32_build.py \
              --build-type "${{ needs.config.outputs.build_type || 'full' }}" \
              --target-component "${{ needs.config.outputs.component || '' }}" \
              --target-version "${{ needs.config.outputs.version || '' }}" \
              --python-version "${{ inputs.python_version || '3.11' }}" \
              --pbs-release "${{ needs.config.outputs.pbs_release }}" \
              --enable-nuitka "${{ inputs.enable_nuitka || 'true' }}" \
              --strip-stdlib "${{ inputs.strip_stdlib || 'true' }}"

      - name: Assemble deployment
        if: needs.config.outputs.build_type != 'skip'
        run: |
          sudo chown -R $(whoami):$(id -gn) dist/ 2>/dev/null || true
          chmod -R u+rw dist/ 2>/dev/null || true
          python3 scripts/generate_deploy.py dist/

      - uses: actions/upload-artifact@v4
        if: needs.config.outputs.build_type != 'skip'
        with:
          name: arm32-deployment
          path: dist/

      - name: Summary
        if: always()
        run: |
          [ "${{ needs.config.outputs.build_type }}" = "skip" ] && echo "⚠️ Skipped: component not found" >> $GITHUB_STEP_SUMMARY && exit 0
          echo "### ARM32 Build" >> $GITHUB_STEP_SUMMARY
          echo "- **Type**: ${{ needs.config.outputs.build_type || 'full' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Nuitka**: ${{ inputs.enable_nuitka || 'true' }}" >> $GITHUB_STEP_SUMMARY
