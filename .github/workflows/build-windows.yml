name: Build Windows App (Briefcase)

on:
  push:
    tags:
      - '*-windows/v*'
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Application to build (e.g., weather, hello, xagent)'
        required: true
        default: 'weather'
        type: string
      version:
        description: 'Version (e.g., 1.0.0)'
        required: false
        default: ''
      python_version:
        description: 'Python version (3.10 / 3.11 / 3.12)'
        required: false
        type: choice
        options:
          - '3.10'
          - '3.11'
          - '3.12'
        default: '3.11'
      enable_nuitka:
        description: 'Enable Nuitka compilation'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: ${{ inputs.python_version || '3.11' }}

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: tag_info
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          APP_NAME="${TAG_NAME%-windows/*}"
          VERSION="${TAG_NAME#*/v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::warning::Invalid version format: $VERSION"
          fi
          echo "APP_NAME=$APP_NAME" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Set build variables
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            APP_NAME="${{ inputs.app_name }}"
            VERSION="${{ inputs.version }}"
            ENABLE_NUITKA="${{ inputs.enable_nuitka }}"
          else
            APP_NAME="${{ steps.tag_info.outputs.APP_NAME }}"
            VERSION="${{ steps.tag_info.outputs.VERSION }}"
            ENABLE_NUITKA="true"
          fi
          [ -z "$VERSION" ] && VERSION="dev"

          echo "APP_NAME=$APP_NAME" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "ENABLE_NUITKA=$ENABLE_NUITKA" >> $GITHUB_OUTPUT

          echo "=== 构建变量 ==="
          echo "APP_NAME: $APP_NAME"
          echo "VERSION: $VERSION"
          echo "ENABLE_NUITKA: $ENABLE_NUITKA"

      - name: Validate app name
        shell: bash
        run: |
          APP_NAME="${{ steps.vars.outputs.APP_NAME }}"
          if [ ! -d "apps/$APP_NAME" ]; then
            echo "::error::Application '$APP_NAME' not found in apps directory"
            echo "Available apps:"
            ls -d apps/*/ 2>/dev/null | xargs -n1 basename || echo "No apps found"
            exit 1
          fi
          echo "Building app: $APP_NAME"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/pip/Cache
          key: ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      - name: Install Nuitka and dependencies
        if: steps.vars.outputs.ENABLE_NUITKA == 'true'
        run: |
          pip install nuitka ordered-set zstandard
          pip install imageio

      - name: Setup MSVC for Nuitka
        if: steps.vars.outputs.ENABLE_NUITKA == 'true'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Update version in pyproject.toml
        if: steps.vars.outputs.VERSION != 'dev'
        shell: bash
        working-directory: apps/${{ steps.vars.outputs.APP_NAME }}
        run: |
          VERSION="${{ steps.vars.outputs.VERSION }}"
          if [ -f pyproject.toml ]; then
            python -c "
            import re, sys
            v = sys.argv[1]
            with open('pyproject.toml', 'r', encoding='utf-8') as f:
                content = f.read()
            content = re.sub(r'^version = .*', f'version = \"{v}\"', content, count=1, flags=re.M)
            with open('pyproject.toml', 'w', encoding='utf-8') as f:
                f.write(content)
            print(f'Updated version to {v}')
            " "$VERSION"
          fi

      - name: Create Briefcase project
        working-directory: apps/${{ steps.vars.outputs.APP_NAME }}
        run: briefcase create windows

      - name: Compile Python modules with Nuitka
        if: steps.vars.outputs.ENABLE_NUITKA == 'true'
        shell: bash
        working-directory: apps/${{ steps.vars.outputs.APP_NAME }}
        env:
          PYTHONIOENCODING: utf-8
        run: |
          SCRIPT_PATH="$GITHUB_WORKSPACE/scripts/nuitka_compile.py"
          BUILD_PATH="build/${{ steps.vars.outputs.APP_NAME }}/windows/app/src/app"
          python "$SCRIPT_PATH" "$BUILD_PATH"

      - name: Build Windows app
        working-directory: apps/${{ steps.vars.outputs.APP_NAME }}
        run: briefcase build windows

      - name: Package Windows app
        working-directory: apps/${{ steps.vars.outputs.APP_NAME }}
        run: briefcase package windows --adhoc-sign -p zip

      - name: Prepare distribution
        shell: bash
        working-directory: apps/${{ steps.vars.outputs.APP_NAME }}
        run: |
          mkdir -p dist
          APP_NAME="${{ steps.vars.outputs.APP_NAME }}"
          VERSION="${{ steps.vars.outputs.VERSION }}"
          APP_TITLE="$(echo ${APP_NAME:0:1} | tr a-z A-Z)${APP_NAME:1}"

          if [ -d "build/${APP_NAME}/windows/app/${APP_TITLE}" ]; then
            cp -r "build/${APP_NAME}/windows/app/${APP_TITLE}" "dist/${APP_NAME}-${VERSION}-windows"
          fi
          if [ -f "build/${APP_NAME}/windows/app/${APP_TITLE}.zip" ]; then
            cp "build/${APP_NAME}/windows/app/${APP_TITLE}.zip" "dist/${APP_NAME}-${VERSION}-windows.zip"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ steps.vars.outputs.APP_NAME }}-${{ steps.vars.outputs.VERSION }}
          path: apps/${{ steps.vars.outputs.APP_NAME }}/dist/

      - name: Build summary
        if: always()
        shell: bash
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: ${{ steps.vars.outputs.APP_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.vars.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: Windows" >> $GITHUB_STEP_SUMMARY
          echo "- **Python**: ${{ env.PYTHON_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Nuitka**: ${{ steps.vars.outputs.ENABLE_NUITKA }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Artifacts" >> $GITHUB_STEP_SUMMARY
          DIST_DIR="apps/${{ steps.vars.outputs.APP_NAME }}/dist"
          if [ -d "$DIST_DIR" ] && [ "$(ls -A "$DIST_DIR" 2>/dev/null)" ]; then
            ls -la "$DIST_DIR" >> $GITHUB_STEP_SUMMARY
          else
            echo "No artifacts found" >> $GITHUB_STEP_SUMMARY
          fi
