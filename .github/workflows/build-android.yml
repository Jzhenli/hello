name: Build Android APK

on:
  push:
    tags:
      - 'android-*/v*'
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App to build (hello / weather / xagent)'
        required: true
        type: choice
        options:
          - hello
          - weather
          - xagent
        default: 'xagent'
      python_version:
        description: 'Python version (3.10 / 3.11 / 3.12)'
        required: false
        type: choice
        options:
          - '3.10'
          - '3.11'
          - '3.12'
        default: '3.11'
      architectures:
        description: 'Target architectures (comma-separated, no spaces: arm64,arm32)'
        required: false
        type: choice
        options:
          - 'arm64'
          - 'arm32'
          - 'arm64,arm32'
        default: 'arm64'
      enable_nuitka:
        description: 'Enable Nuitka compilation for source protection'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: ${{ inputs.python_version || '3.11' }}
  NUITKA_VERSION: '2.7.12'
  BRIEFCASE_VERSION: '0.3.23'

jobs:
  # ============================================================
  # 1. 准备配置 + 动态矩阵生成
  # ============================================================
  prepare:
    runs-on: ubuntu-latest
    outputs:
      app_name: ${{ steps.config.outputs.app_name }}
      architectures: ${{ steps.config.outputs.architectures }}
      enable_nuitka: ${{ steps.config.outputs.enable_nuitka }}
      app_version: ${{ steps.config.outputs.app_version }}
      compile_matrix: ${{ steps.matrix.outputs.compile_matrix }}
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract configuration
        id: config
        run: |
          if [[ "$GITHUB_REF" == refs/tags/android-*/v* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            APP_NAME=${TAG_NAME#android-}
            APP_NAME=${APP_NAME%/v*}
            APP_VERSION=${TAG_NAME#*/v}
            echo "📋 Tag解析: APP_NAME=$APP_NAME, APP_VERSION=$APP_VERSION"
          else
            APP_NAME="${{ inputs.app_name || 'xagent' }}"
            APP_VERSION=""
          fi

          if [ ! -d "apps/$APP_NAME" ]; then
            echo "::error::App '$APP_NAME' not found in apps/ directory"
            exit 1
          fi

          if [ -f "apps/$APP_NAME/pyproject.toml" ]; then
            if [ -z "$APP_VERSION" ]; then
              APP_VERSION=$(grep -Po 'version\s*=\s*"\K[^"]+' "apps/$APP_NAME/pyproject.toml" | head -1)
            fi
            if ! grep -q "\[tool.briefcase.app.${APP_NAME}.android\]" "apps/$APP_NAME/pyproject.toml" && \
               ! grep -q "\[tool.briefcase.app.${APP_NAME}\]" "apps/$APP_NAME/pyproject.toml"; then
              echo "::error::App '$APP_NAME' does not have Briefcase Android configuration in pyproject.toml"
              exit 1
            fi
          else
            echo "::error::pyproject.toml not found for app '$APP_NAME'. Please create Briefcase configuration first."
            exit 1
          fi

          ARCHITECTURES="${{ inputs.architectures || 'arm64' }}"
          ARCHITECTURES=$(echo "$ARCHITECTURES" | tr -d ' ')
          ENABLE_NUITKA="${{ inputs.enable_nuitka || 'true' }}"

          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "architectures=$ARCHITECTURES" >> $GITHUB_OUTPUT
          echo "enable_nuitka=$ENABLE_NUITKA" >> $GITHUB_OUTPUT
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT

          echo "### Configuration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: $APP_NAME" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: $APP_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Python**: ${{ env.PYTHON_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Architectures**: $ARCHITECTURES" >> $GITHUB_STEP_SUMMARY
          echo "- **Nuitka**: $ENABLE_NUITKA" >> $GITHUB_STEP_SUMMARY

      # 根据用户选择的架构，动态生成矩阵 JSON
      - name: Generate matrix
        id: matrix
        run: |
          ARCHS="${{ steps.config.outputs.architectures }}"

          COMPILE_ENTRIES=""
          BUILD_ENTRIES=""

          if [[ "$ARCHS" == *"arm64"* ]]; then
            COMPILE_ENTRIES+='{"arch":"arm64","runs_on":"ubuntu-24.04-arm","termux_arch":"aarch64","android_abi":"arm64-v8a"},'
            BUILD_ENTRIES+='{"arch":"arm64","android_abi":"arm64-v8a","apk_arch":"arm64"},'
          fi

          if [[ "$ARCHS" == *"arm32"* ]]; then
            COMPILE_ENTRIES+='{"arch":"arm32","runs_on":"ubuntu-24.04-arm","termux_arch":"arm","android_abi":"armeabi-v7a"},'
            BUILD_ENTRIES+='{"arch":"arm32","android_abi":"armeabi-v7a","apk_arch":"arm32"},'
          fi

          # 去掉末尾逗号，包装成 JSON 数组
          COMPILE_MATRIX="[$(echo "$COMPILE_ENTRIES" | sed 's/,$//')]"
          BUILD_MATRIX="[$(echo "$BUILD_ENTRIES" | sed 's/,$//')]"
          
          # 验证 JSON 合法性
          echo "$COMPILE_MATRIX" | python3 -m json.tool > /dev/null || { echo "::error::Invalid compile matrix JSON"; exit 1; }
          echo "$BUILD_MATRIX" | python3 -m json.tool > /dev/null || { echo "::error::Invalid build matrix JSON"; exit 1; }

          echo "compile_matrix=$COMPILE_MATRIX" >> $GITHUB_OUTPUT
          echo "build_matrix=$BUILD_MATRIX" >> $GITHUB_OUTPUT

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Generated Matrices" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Compile:** \`${COMPILE_MATRIX}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Build:** \`${BUILD_MATRIX}\`" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # 2. 阶段 1：Termux Docker 原生编译 .so
  # ============================================================
  compile:
    needs: prepare
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.compile_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile with Nuitka (Termux Docker)
        if: needs.prepare.outputs.enable_nuitka == 'true'
        run: |
          # 1. 准备输出目录，确保容器内 system 用户可写
          mkdir -p dist/${{ matrix.android_abi }}
          chmod 777 dist/${{ matrix.android_abi }}

          # 2. 把构建脚本写到一个临时文件里
          cat > /tmp/termux_build.sh <<BUILDEOF
          #!/bin/bash
          set -e

          cd /workspace

          echo "📋 编译参数: APP=${{ needs.prepare.outputs.app_name }}, PYTHON=${{ env.PYTHON_VERSION }}, TERMUX_ARCH=${{ matrix.termux_arch }}"

          # 网络诊断（帮助排查）
          echo "🔍 网络诊断..."
          cat /etc/resolv.conf || true
          curl -sI https://packages-cf.termux.dev/apt/termux-main/dists/stable/Release 2>&1 | head -5 || echo "⚠️ 无法连接镜像源"

          # 设置镜像源
          ln -sf \${PREFIX}/etc/termux/mirrors/default \${PREFIX}/etc/termux/chosen_mirrors

          # 全量升级
          pkg upgrade -y

          # 安装 tur-repo 及编译工具
          pkg install -y tur-repo
          pkg install -y python${{ env.PYTHON_VERSION }} clang ninja patchelf termux-elf-cleaner findutils

          # 建立 Python 软链接
          ln -sf \${PREFIX}/bin/python${{ env.PYTHON_VERSION }} \${PREFIX}/bin/python
          ln -sf \${PREFIX}/bin/pip${{ env.PYTHON_VERSION }} \${PREFIX}/bin/pip

          # 安装 Nuitka 及依赖
          pip install MarkupSafe==3.0.2 ordered-set==4.1.0 zstandard==0.23.0 nuitka==${{ env.NUITKA_VERSION }}

          # Nuitka 编译
          cd "apps/${{ needs.prepare.outputs.app_name }}/src"
          mkdir -p /tmp/compiled

          python -m nuitka \
            --module ${{ needs.prepare.outputs.app_name }} \
            --include-package=${{ needs.prepare.outputs.app_name }} \
            --output-dir=/tmp/compiled \
            --remove-output \
            --assume-yes-for-downloads \
            --no-progressbar

          # 拷贝并重命名 .so
          cd /tmp/compiled
          SO_FILE=\$(ls ${{ needs.prepare.outputs.app_name }}.*.so 2>/dev/null | head -1)
          if [ -z "\$SO_FILE" ]; then
            echo '::error::Nuitka compilation failed - no .so file produced'
            exit 1
          fi
          mv "\$SO_FILE" ${{ needs.prepare.outputs.app_name }}.so

          # ELF 清理 & patchelf
          echo '🧹 ELF 清理...'
          termux-elf-cleaner ${{ needs.prepare.outputs.app_name }}.so

          echo '🔧 修复链接...'
          patchelf --set-rpath '' ${{ needs.prepare.outputs.app_name }}.so || true
          patchelf --replace-needed libpython${{ env.PYTHON_VERSION }}.so.1.0 libpython${{ env.PYTHON_VERSION }}.so ${{ needs.prepare.outputs.app_name }}.so || true

          # 拷贝到宿主 dist 目录
          cp ${{ needs.prepare.outputs.app_name }}.so /workspace/dist/${{ matrix.android_abi }}/

          echo '✅ 编译完成: ${{ needs.prepare.outputs.app_name }}.so'
          BUILDEOF

          chmod +x /tmp/termux_build.sh

          # 3. 用默认入口启动（自动初始化 + 降权到 system 用户）
          #    关键修复：
          #    - 不用 --entrypoint，让 /entrypoint.sh 处理初始化和降权
          #    - --dns 8.8.8.8 绕过 dnsmasq，Docker 层面设置 DNS
          #    - --security-opt seccomp=unconfined 允许 ARM 容器的系统调用
          docker run --rm \
            --dns 8.8.8.8 \
            --dns 8.8.4.4 \
            --security-opt seccomp=unconfined \
            -v "$PWD:/workspace" \
            -v "/tmp/termux_build.sh:/tmp/termux_build.sh:ro" \
            termux/termux-docker:${{ matrix.termux_arch }} \
            bash /tmp/termux_build.sh





  # ============================================================
  # 3. 阶段 2：Briefcase 打包 APK
  # ============================================================
  build:
    needs: [prepare, compile]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.build_matrix) }}
    # ✅ 不再需要 job 级 if，矩阵只包含选中的架构

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Briefcase
        run: |
          pip install -U setuptools wheel
          pip install briefcase==${{ env.BRIEFCASE_VERSION }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Environment
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download compiled artifacts
        uses: actions/download-artifact@v4
        with:
          name: compiled-${{ matrix.android_abi }}
          path: dist/${{ matrix.android_abi }}

      - name: Prepare app source
        run: |
          APP_NAME="${{ needs.prepare.outputs.app_name }}"
          ENABLE_NUITKA="${{ needs.prepare.outputs.enable_nuitka }}"

          cd "apps/${APP_NAME}/src"

          if [ "$ENABLE_NUITKA" = "true" ] && [ -f "../../../dist/${{ matrix.android_abi }}/${APP_NAME}.so" ]; then
            echo "📦 替换源码: ${APP_NAME} -> ${APP_NAME}.so"

            saved_resources=()
            if [ -d "${APP_NAME}" ]; then
              while IFS= read -r -d '' f; do
                if [ -f "$f" ]; then
                  saved_resources+=("$f")
                fi
              done < <(find "${APP_NAME}" -type f ! -name '*.py' -print0 2>/dev/null)
            fi

            if [ ${#saved_resources[@]} -gt 0 ]; then
              echo "  保留 ${#saved_resources[@]} 个非 .py 资源文件"
            fi

            rm -rf "${APP_NAME}"
            mkdir -p "${APP_NAME}"

            for res in "${saved_resources[@]}"; do
              rel_path=${res#${APP_NAME}/}
              dest_dir="$(dirname "${APP_NAME}/$rel_path")"
              mkdir -p "$dest_dir"
              cp "$res" "${APP_NAME}/$rel_path" 2>/dev/null || true
            done

            cp "../../../dist/${{ matrix.android_abi }}/${APP_NAME}.so" .

            cat > "${APP_NAME}/__init__.py" << 'EOF'
          import os, sys, importlib.util as _u
          _n = __name__
          _d = os.path.dirname(os.path.abspath(__file__))
          _p = os.path.dirname(_d)
          _f = next((f for f in os.listdir(_p) if f.startswith(_n) and f.endswith(('.pyd', '.so'))), None)
          if not _f:
              raise ImportError(f'No {_n} compiled module in {_p}')
          if hasattr(os, 'add_dll_directory'):
              os.add_dll_directory(os.path.dirname(_p))
          _s = _u.spec_from_file_location(_n, os.path.join(_p, _f))
          _m = _u.module_from_spec(_s)
          _s.loader.exec_module(_m)
          _m.__path__ = getattr(_m, '__path__', None) or [_d]
          _m.__package__ = _n
          if _m.__spec__:
              _m.__spec__.submodule_search_locations = list(_m.__path__)

          class _F:
              @staticmethod
              def find_spec(n, *_):
                  if n == f'{_n}.__main__':
                      return _u.spec_from_file_location(n, os.path.join(_d, '__main__.py'))

          sys.meta_path.insert(0, _F)
          sys.modules[_n] = _m
          EOF

            cat > "${APP_NAME}/__main__.py" << 'EOF'
          import importlib, sys
          _m = importlib.import_module(__package__)
          _m.main() if hasattr(_m, 'main') else sys.exit(f'No main() in {__package__}')
          EOF

            echo "✅ 入口桩文件: ${APP_NAME}/__init__.py, __main__.py"
          else
            echo "⚠️ 使用明文源码"
          fi

      - name: Create Android project
        run: |
          APP_NAME="${{ needs.prepare.outputs.app_name }}"
          cd "apps/${APP_NAME}"
          briefcase create android -C "build_gradle_extra_content = \"android.defaultConfig.ndk.abiFilters = ['${{ matrix.android_abi }}']\""

      - name: Build Android APK
        run: |
          APP_NAME="${{ needs.prepare.outputs.app_name }}"
          cd "apps/${APP_NAME}"
          briefcase build android

      - name: Package Android APK
        run: |
          APP_NAME="${{ needs.prepare.outputs.app_name }}"
          cd "apps/${APP_NAME}"
          briefcase package android -p apk

      - name: Rename and collect APK
        run: |
          APP_NAME="${{ needs.prepare.outputs.app_name }}"
          cd "apps/${APP_NAME}"

          mkdir -p ../../final_dist

          APK=$(ls dist/*.apk 2>/dev/null | head -n 1)
          if [ -n "$APK" ]; then
            BASENAME=$(basename "$APK" .apk)
            NEWNAME=$(echo "$BASENAME" | sed -E 's/^([^-]+)-(.+)$/\1-${{ matrix.apk_arch }}-\2/')
            if [ "$NEWNAME" = "$BASENAME" ]; then
              NEWNAME="${BASENAME}-${{ matrix.apk_arch }}"
            fi
            mv "$APK" "../../final_dist/${NEWNAME}.apk"
            echo "✅ APK: ${NEWNAME}.apk"
          else
            echo "::warning::APK not found in dist/*.apk, attempting deep search..."
            find . -name "*.apk" -exec cp {} ../../final_dist/ \;
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.android_abi }}
          path: final_dist/

      - name: Upload Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: log-failure-${{ matrix.android_abi }}
          path: apps/${{ needs.prepare.outputs.app_name }}/logs/*

      - name: Build summary
        run: |
          APP_NAME="${{ needs.prepare.outputs.app_name }}"
          APP_VERSION="${{ needs.prepare.outputs.app_version }}"

          echo "### Build Summary (${{ matrix.android_abi }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: ${APP_NAME}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${APP_VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- **Architecture**: ${{ matrix.android_abi }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Nuitka**: ${{ needs.prepare.outputs.enable_nuitka }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "#### Artifacts" >> $GITHUB_STEP_SUMMARY
          if [ -d "final_dist" ] && [ "$(ls -A final_dist 2>/dev/null)" ]; then
            for f in final_dist/*; do
              [ -f "$f" ] && echo "- \`${f#final_dist/}\`: $(du -sh "$f" | cut -f1)" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "- No artifacts generated" >> $GITHUB_STEP_SUMMARY
          fi
