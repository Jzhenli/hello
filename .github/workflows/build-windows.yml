name: Build Windows App (Briefcase)

on:
  push:
    tags:
      - 'weather-windows/v*'
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Application to build'
        required: true
        default: 'weather'
        type: choice
        options:
          - weather
      version:
        description: 'Version (e.g., 1.0.0)'
        required: false
        default: ''
      python_version:
        description: 'Python version (3.10 / 3.11 / 3.12)'
        required: false
        default: '3.11'
      enable_nuitka:
        description: 'Enable Nuitka compilation'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

env:
  PYTHON_VERSION: ${{ inputs.python_version || '3.11' }}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          pip install briefcase

      - name: Install Nuitka and dependencies
        if: inputs.enable_nuitka == true
        run: |
          pip install nuitka ordered-set zstandard
          pip install imageio

      - name: Setup MSVC for Nuitka
        if: inputs.enable_nuitka == true
        uses: ilammy/msvc-dev-cmd@v1

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: tag_info
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          APP_NAME="${TAG_NAME%-windows/*}"
          VERSION="${TAG_NAME#*/v}"
          echo "APP_NAME=$APP_NAME" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Set build variables
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "APP_NAME=${{ inputs.app_name }}" >> $GITHUB_OUTPUT
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
            if [ "${{ inputs.enable_nuitka }}" = "true" ] || [ "${{ inputs.enable_nuitka }}" = "True" ]; then
              echo "ENABLE_NUITKA=true" >> $GITHUB_OUTPUT
            else
              echo "ENABLE_NUITKA=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "APP_NAME=${{ steps.tag_info.outputs.APP_NAME }}" >> $GITHUB_OUTPUT
            echo "VERSION=${{ steps.tag_info.outputs.VERSION }}" >> $GITHUB_OUTPUT
            echo "ENABLE_NUITKA=true" >> $GITHUB_OUTPUT
          fi
          
          echo "=== 构建变量 ==="
          echo "APP_NAME: $(grep APP_NAME $GITHUB_OUTPUT | cut -d= -f2)"
          echo "VERSION: $(grep VERSION $GITHUB_OUTPUT | cut -d= -f2)"
          echo "ENABLE_NUITKA: $(grep ENABLE_NUITKA $GITHUB_OUTPUT | cut -d= -f2)"

      - name: Update version in pyproject.toml
        if: steps.vars.outputs.VERSION != ''
        shell: bash
        working-directory: apps/${{ steps.vars.outputs.APP_NAME }}
        run: |
          VERSION="${{ steps.vars.outputs.VERSION }}"
          if [ -f pyproject.toml ]; then
            sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
            echo "Updated version to $VERSION"
          fi

      - name: Create Briefcase project
        working-directory: apps/${{ steps.vars.outputs.APP_NAME }}
        run: |
          briefcase create windows

      - name: Compile Python modules with Nuitka
        if: steps.vars.outputs.ENABLE_NUITKA == 'true'
        shell: bash
        working-directory: apps/${{ steps.vars.outputs.APP_NAME }}
        run: |
          set -x
          APP_NAME="${{ steps.vars.outputs.APP_NAME }}"
          ENABLE_NUITKA="${{ steps.vars.outputs.ENABLE_NUITKA }}"
          
          echo "ENABLE_NUITKA = $ENABLE_NUITKA"
          
          SRC_DIR="build/${APP_NAME}/windows/app/src/app"
          
          if [ ! -d "$SRC_DIR" ]; then
            echo "错误: 找不到源码目录 $SRC_DIR"
            echo "当前目录结构:"
            find build -type d 2>/dev/null | head -30
            exit 1
          fi
          
          echo "=== Nuitka 编译开始 ==="
          echo "源码目录: $SRC_DIR"
          echo "目录内容:"
          ls -la "$SRC_DIR/"
          
          cd "$SRC_DIR"
          
          echo "查找可编译的模块..."
          for module_dir in */ ; do
            module_name="${module_dir%/}"
            echo "检查: $module_name"
            
            if [ "$module_name" = "__pycache__" ]; then
              echo "  跳过: __pycache__"
              continue
            fi
            
            if [ ! -f "$module_name/__init__.py" ]; then
              echo "  跳过: 无 __init__.py"
              continue
            fi
            
            echo "--- 编译模块: $module_name ---"
            
            python -m nuitka \
              --module "$module_name" \
              --output-dir=./compiled \
              --remove-output \
              --assume-yes-for-downloads \
              --nofollow-imports \
              --follow-import-to="$module_name" \
              --no-progressbar 2>&1
            
            echo "编译完成，检查产物..."
            ls -la ./compiled/ 2>/dev/null || echo "compiled 目录不存在"
          done
          
          echo "--- 移动编译产物 ---"
          if [ -d "./compiled" ]; then
            for pyd_file in ./compiled/*.pyd; do
              if [ -f "$pyd_file" ]; then
                cp "$pyd_file" ./
                echo "已复制: $(basename $pyd_file)"
              fi
            done
          else
            echo "警告: compiled 目录不存在，可能编译失败"
          fi
          
          echo "当前目录内容:"
          ls -la
          
          echo "--- 创建入口文件并清理源码 ---"
          for module_dir in */ ; do
            module_name="${module_dir%/}"
            if [ "$module_name" = "__pycache__" ] || [ "$module_name" = "compiled" ]; then
              continue
            fi
            
            pyd_pattern="${module_name}.cpython-*.pyd"
            
            echo "检查模块: $module_name, pyd文件模式: $pyd_pattern"
            
            if ls $pyd_pattern 1> /dev/null 2>&1; then
              echo "找到 .pyd 文件"
              
              if [ -f "$module_name/__main__.py" ]; then
                echo "删除源码目录内容..."
                rm -rf "$module_name"
                mkdir -p "$module_name"
                
                echo "创建入口文件: ${module_name}/__init__.py"
                
                pyd_file=$(ls $pyd_pattern | head -1)
                pyd_basename=$(basename "$pyd_file")
                echo ".pyd 文件名: $pyd_basename"
                
                printf '%s\n' \
                  'import importlib.util' \
                  'import os' \
                  '' \
                  "_pyd_path = os.path.join(os.path.dirname(__file__), '..', '${pyd_basename}')" \
                  "_spec = importlib.util.spec_from_file_location('${module_name}', _pyd_path)" \
                  '_module = importlib.util.module_from_spec(_spec)' \
                  '_spec.loader.exec_module(_module)' \
                  > "$module_name/__init__.py"
                
                printf '%s\n' \
                  "from ${module_name} import _module" \
                  '' \
                  'if hasattr(_module, "main"):' \
                  '    _module.main()' \
                  'else:' \
                  '    print("Error: No main() function found")' \
                  '    import sys' \
                  '    sys.exit(1)' \
                  > "$module_name/__main__.py"
                
                echo "已创建入口文件"
              else
                echo "移除源码目录: $module_name"
                rm -rf "$module_name"
              fi
            else
              echo "未找到 .pyd 文件，跳过"
            fi
          done
          
          rm -rf ./compiled 2>/dev/null || true
          
          echo "=== Nuitka 编译完成 ==="
          echo "编译产物:"
          ls -la *.pyd 2>/dev/null || echo "未找到 .pyd 文件"
          
          echo ""
          echo "最终目录结构:"
          ls -la
          
          echo ""
          echo "入口模块内容:"
          for d in */ ; do
            if [ -f "$d/__main__.py" ]; then
              echo "--- $d ---"
              ls -la "$d"
            fi
          done

      - name: Build Windows app
        working-directory: apps/${{ steps.vars.outputs.APP_NAME }}
        run: |
          briefcase build windows

      - name: Package Windows app
        working-directory: apps/${{ steps.vars.outputs.APP_NAME }}
        run: |
          briefcase package windows --adhoc-sign -p zip

      - name: Prepare distribution
        shell: bash
        working-directory: apps/${{ steps.vars.outputs.APP_NAME }}
        run: |
          mkdir -p dist
          VERSION="${{ steps.vars.outputs.VERSION }}"
          [ -z "$VERSION" ] && VERSION="dev"
          
          APP_NAME="${{ steps.vars.outputs.APP_NAME }}"
          FORMAL_NAME="$(echo "${APP_NAME:0:1}" | tr '[:lower:]' '[:upper:]')${APP_NAME:1}"
          
          if [ -d "build/${APP_NAME}/windows/app/${FORMAL_NAME}" ]; then
            cp -r "build/${APP_NAME}/windows/app/${FORMAL_NAME}" "dist/${APP_NAME}-$VERSION-windows"
          fi
          
          if [ -f "build/${APP_NAME}/windows/app/${FORMAL_NAME}.zip" ]; then
            cp "build/${APP_NAME}/windows/app/${FORMAL_NAME}.zip" "dist/${APP_NAME}-$VERSION-windows.zip"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ steps.vars.outputs.APP_NAME }}-${{ steps.vars.outputs.VERSION }}
          path: apps/${{ steps.vars.outputs.APP_NAME }}/dist/

      - name: Build summary
        if: always()
        shell: bash
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: ${{ steps.vars.outputs.APP_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.vars.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: Windows" >> $GITHUB_STEP_SUMMARY
          echo "- **Nuitka**: ${{ steps.vars.outputs.ENABLE_NUITKA }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Artifacts" >> $GITHUB_STEP_SUMMARY
          ls -la apps/${{ steps.vars.outputs.APP_NAME }}/dist/ 2>/dev/null | while read line; do echo "$line" >> $GITHUB_STEP_SUMMARY; done || echo "No artifacts found" >> $GITHUB_STEP_SUMMARY
